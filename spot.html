<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>SpotMe · Community</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#060a0f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --bg: #060a0f; --sur: #0c1219; --card: #101820; --card2: #141f2e;
  --bord: rgba(255,255,255,.08); --bord2: rgba(255,255,255,.13);
  --acc: #00e5c0; --acc-dim: rgba(0,229,192,.12); --p2: #7b5cfa; --p3: #ff4f7b;
  --text: #dde4f0; --muted: #4e6070; --muted2: #7a8fa8; --green: #1ecc68;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent }
html, body { min-height:100%; background:var(--bg); color:var(--text); font-family:'DM Sans', sans-serif; font-size:17px; }
.page { max-width:480px; margin:0 auto; padding:0 1.25rem 6rem; }
.topnav { position:sticky; top:0; z-index:100; background:rgba(6,10,15,.96); backdrop-filter:blur(24px); border-bottom:1px solid var(--bord); padding:.7rem 1.25rem; }
.topnav-inner { max-width:480px; margin:0 auto; display:flex; align-items:center; gap:.7rem; }
.back-link { width:40px; height:40px; border-radius:11px; border:1px solid var(--bord2); background:rgba(255,255,255,.04); color:var(--muted2); font-size:1.3rem; display:flex; align-items:center; justify-content:center; text-decoration:none; }
.nav-title { flex:1; font-family:'Syne',sans-serif; font-weight:800; font-size:1.15rem; color:var(--acc); }
.refresh-btn { width:40px; height:40px; border-radius:11px; border:1px solid var(--bord2); background:rgba(255,255,255,.04); color:var(--muted2); font-size:1.1rem; display:flex; align-items:center; justify-content:center; cursor:pointer; }
.refresh-btn.spinning { animation:spin .6s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.my-card { background:linear-gradient(135deg, rgba(0,229,192,.06) 0%, rgba(123,92,250,.06) 100%); border:1px solid rgba(0,229,192,.2); border-radius:20px; padding:1.25rem; margin:1rem 0; }
.my-card-header { display:flex; align-items:center; gap:.9rem; margin-bottom:1rem }
.my-avatar { width:56px; height:56px; border-radius:50%; background:linear-gradient(135deg,var(--p2),var(--p3)); display:flex; align-items:center; justify-content:center; font-size:1.5rem; border:2px solid var(--bord2); overflow:hidden; }
.my-name { font-family:'Syne',sans-serif; font-weight:700; }
.publish-row, .location-row { display:flex; align-items:center; justify-content:space-between; padding:.7rem .9rem; border-radius:12px; background:rgba(255,255,255,.04); border:1px solid var(--bord); margin-bottom:0.5rem; }
.toggle { width:46px; height:26px; border-radius:13px; background:var(--sur); border:1.5px solid var(--bord2); position:relative; cursor:pointer; }
.toggle.on { background:var(--acc); border-color:var(--acc); }
.toggle::after { content:''; position:absolute; width:18px; height:18px; border-radius:50%; background:#fff; top:2px; left:2px; transition:transform .2s; }
.toggle.on::after { transform:translateX(20px); }
.profile-card { background:var(--card2); border:1px solid var(--bord); border-radius:18px; padding:1.1rem; margin-bottom:.9rem; }
.card-top { display:flex; align-items:flex-start; gap:.85rem; }
.location-badge { display:inline-flex; align-items:center; gap:4px; background:rgba(0,229,192,.1); border:1px solid rgba(0,229,192,.3); border-radius:100px; padding:2px 8px; font-size:0.65rem; color:var(--acc); margin-left:8px; cursor:pointer; }
.btn-chat { padding:.52rem 1.1rem; border-radius:10px; background:var(--acc); color:var(--bg); font-weight:700; border:none; cursor:pointer; }
.toast { position:fixed; bottom:2.5rem; left:50%; transform:translateX(-50%); background:var(--card2); border:1px solid var(--bord2); border-radius:100px; padding:.55rem 1.25rem; z-index:9999; opacity:0; transition:opacity .3s; }
.toast.show { opacity:1; }
.location-modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.8); backdrop-filter:blur(4px); z-index:1000; display:none; align-items:center; justify-content:center; }
.location-modal { background:var(--card2); border-radius:24px; padding:1.5rem; width:90%; max-width:400px; }
#location-map-small { height:200px; border-radius:12px; }
</style>
</head>
<body>
<nav class="topnav"><div class="topnav-inner"><a class="back-link" href="index.html">‹</a><div class="nav-title">Spot<b>Me</b></div><button class="refresh-btn" id="refresh-btn" onclick="loadCommunity()">↺</button></div></nav>
<div class="page">
  <div class="my-section">
    <div class="section-label"><span>Mein Profil</span></div>
    <div class="no-profile-hint" id="no-profile-hint" style="display:none"><span>⚠️</span><div>Noch kein Profil erstellt.<br><a href="profil.html">Profil anlegen →</a></div></div>
    <div class="my-card" id="my-card" style="display:none">
      <div class="my-card-header"><div class="my-avatar" id="my-avatar">🧑</div><div class="my-info"><div class="my-name" id="my-name">—</div><div class="my-meta" id="my-meta">—</div><div class="my-code" id="my-code">—</div></div></div>
      <div class="publish-row"><div><div class="publish-label">In Community anzeigen</div><div class="publish-hint" id="publish-hint"></div></div><div class="toggle" id="publish-toggle" onclick="togglePublish()"></div></div>
      <div class="location-row"><div><div class="location-label">📍 An diesem Ort anzutreffen</div><div class="location-hint" id="location-hint"></div></div><div class="toggle" id="location-toggle" onclick="toggleLocationSharing()"></div></div>
    </div>
  </div>
  <div class="section-label"><span>Community durchsuchen</span></div>
  <div class="filter-bar">
    <div class="filter-title">Filter</div>
    <div class="filter-grid">
      <select class="fsel" id="f-region" onchange="applyFilters()"><option value="">Alle Regionen</option></select>
      <select class="fsel" id="f-age" onchange="applyFilters()"><option value="">Alle Altersgruppen</option><option value="18-29">18–29</option><option value="30-39">30–39</option><option value="40-49">40–49</option><option value="50+">50+</option></select>
    </div>
    <div class="filter-chips">
      <button class="chip" data-filter="homo" onclick="toggleChip(this)">🏳️‍🌈 Homo</button>
      <button class="chip" data-filter="bi" onclick="toggleChip(this)">Bi</button>
      <button class="chip" data-filter="hetero" onclick="toggleChip(this)">Hetero</button>
      <button class="chip" data-filter="bottom" onclick="toggleChip(this)">Bottom</button>
      <button class="chip" data-filter="top" onclick="toggleChip(this)">Top</button>
      <button class="chip" data-filter="versatile" onclick="toggleChip(this)">Versatile</button>
      <button class="chip" data-filter="trans" onclick="toggleChip(this)">Trans</button>
    </div>
    <button class="filter-reset" onclick="resetFilters()">✕ Filter zurücksetzen</button>
  </div>
  <div class="community-header"><div class="section-label"><span>Profile</span></div><div class="community-count" id="community-count"></div></div>
  <div id="community-list"><div class="loading-row">Lade Community...</div></div>
</div>
<div class="location-modal-overlay" id="location-modal" onclick="closeLocationModal(event)"><div class="location-modal" onclick="event.stopPropagation()"><div class="location-modal-header"><div class="location-modal-title" id="location-modal-name"></div><button class="location-modal-close" onclick="closeLocationModal()">✕</button></div><div id="location-map-small"></div><div class="location-distance" id="location-distance"></div></div></div>
<div class="toast" id="toast"></div>
<script>
'use strict';
const API = 'https://spotme-chat.onrender.com/api';
const CHAT_PAGE = 'index.html';
const PROFILE_KEY = 'sm_profile';
const KEEPALIVE_INTERVAL = 8 * 60 * 1000;
const LOCATION_UPDATE_INTERVAL = 30000;
const LOCATION_REFRESH_INTERVAL = 10000;

let myProfile = null, myCode = localStorage.getItem('sm_code') || '', isPublished = false, isSharingLocation = false;
let allProfiles = [], filtered = [];
let keepaliveTimer = null, locationTimer = null, locationWatchId = null, locationRefreshTimer = null;
const REGIONS = ['Andalusien','Aragón','Asturien','Balearen','Baskenland','Extremadura','Galicien','Kanaren','Kantabrien','Kastilien-La Mancha','Kastilien-León','Katalonien','La Rioja','Madrid','Murcia','Navarra','Valencia (Region)'];

window.addEventListener('load', async () => {
  buildRegionFilter();
  loadMyProfile();
  await loadCommunity();
  if (isPublished && myProfile) await verifyAndRepublish();
  startKeepalive();
  isSharingLocation = localStorage.getItem('sm_spot_location') === '1';
  updateLocationUI();
  if (isSharingLocation) startLocationSharing();
  startLocationRefresh();
  // Eigene Position für Entfernungsberechnung merken
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(p => { userPos = { lat: p.coords.latitude, lng: p.coords.longitude }; }, () => {});
  }
});

function startKeepalive() {
  if (keepaliveTimer) clearInterval(keepaliveTimer);
  keepaliveTimer = setInterval(async () => {
    if (isPublished && myProfile) { try { await publishProfile(true); } catch(e) {} }
    await loadCommunity();
  }, KEEPALIVE_INTERVAL);
}

function startLocationRefresh() {
  if (locationRefreshTimer) clearInterval(locationRefreshTimer);
  locationRefreshTimer = setInterval(async () => {
    for (const p of allProfiles) { if (p.code !== myCode) fetchLocationForProfile(p.code); }
  }, LOCATION_REFRESH_INTERVAL);
}

async function verifyAndRepublish() {
  try { const res = await fetch(API + '/profile/' + myCode); if (res.status === 404) { await publishProfile(true); await loadCommunity(); } } catch(e) {}
}

function buildRegionFilter() {
  const sel = document.getElementById('f-region');
  REGIONS.forEach(r => { const o = document.createElement('option'); o.value = o.textContent = r; sel.appendChild(o); });
}

function loadMyProfile() {
  const raw = localStorage.getItem(PROFILE_KEY);
  if (!raw) { document.getElementById('no-profile-hint').style.display = 'flex'; document.getElementById('my-card').style.display = 'none'; return; }
  try { myProfile = JSON.parse(raw); } catch { return; }
  document.getElementById('no-profile-hint').style.display = 'none';
  document.getElementById('my-card').style.display = 'block';
  const av = document.getElementById('my-avatar');
  if (myProfile.avatar) av.innerHTML = `<img src="${myProfile.avatar}">`;
  else av.textContent = myProfile.name ? myProfile.name[0].toUpperCase() : '🧑';
  document.getElementById('my-name').textContent = myProfile.name || '—';
  const age = myProfile.year ? (new Date().getFullYear() - myProfile.year) : null;
  const loc = [myProfile.city, myProfile.region].filter(Boolean).join(', ');
  document.getElementById('my-meta').textContent = [age ? age + ' J.' : null, loc].filter(Boolean).join(' · ') || 'Kein Ort';
  document.getElementById('my-code').textContent = myCode ? 'Code: ' + myCode.slice(0,3) + ' · ' + myCode.slice(3,6) : '';
  isPublished = localStorage.getItem('sm_spot_published') === '1';
  updatePublishUI();
}

function updatePublishUI() {
  const t = document.getElementById('publish-toggle'), h = document.getElementById('publish-hint');
  t.classList.toggle('on', isPublished);
  h.textContent = isPublished ? '✓ Dein Profil ist sichtbar' : 'Nicht sichtbar';
}

function updateLocationUI() {
  const t = document.getElementById('location-toggle'), h = document.getElementById('location-hint');
  t.classList.toggle('on', isSharingLocation);
  h.textContent = isSharingLocation ? '✓ Standort wird geteilt' : 'Standort teilen';
}

async function toggleLocationSharing() {
  if (!myProfile || !myCode) { toast('⚠️ Profil unvollständig'); return; }
  if (isSharingLocation) {
    stopLocationSharing();
    isSharingLocation = false;
    localStorage.setItem('sm_spot_location', '0');
    updateLocationUI();
    toast('📍 Standortfreigabe beendet');
  } else {
    const ok = await startLocationSharing();
    if (ok) {
      isSharingLocation = true;
      localStorage.setItem('sm_spot_location', '1');
      updateLocationUI();
    } else {
      toast('❌ Standort konnte nicht aktiviert werden. Erlaube den Zugriff in den Einstellungen.');
    }
  }
}

async function startLocationSharing() {
  if (!navigator.geolocation) { toast('❌ Geolocation nicht unterstützt'); return false; }
  try {
    const pos = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej, { enableHighAccuracy: true, timeout: 10000 }));
    await sendLocationToServer(pos.coords.latitude, pos.coords.longitude);
    toast('📍 Standort erfolgreich gesendet');
    if (locationWatchId) navigator.geolocation.clearWatch(locationWatchId);
    locationWatchId = navigator.geolocation.watchPosition(
      async p => { await sendLocationToServer(p.coords.latitude, p.coords.longitude); },
      e => console.warn('watch err', e),
      { enableHighAccuracy: true, maximumAge: 30000 }
    );
    if (locationTimer) clearInterval(locationTimer);
    locationTimer = setInterval(async () => {
      try {
        const p = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej, { enableHighAccuracy: true, timeout: 10000 }));
        await sendLocationToServer(p.coords.latitude, p.coords.longitude);
      } catch {}
    }, LOCATION_UPDATE_INTERVAL);
    return true;
  } catch (e) {
    console.warn('Location error:', e);
    return false;
  }
}

function stopLocationSharing() {
  if (locationWatchId) { navigator.geolocation.clearWatch(locationWatchId); locationWatchId = null; }
  if (locationTimer) { clearInterval(locationTimer); locationTimer = null; }
}

async function sendLocationToServer(lat, lng) {
  try {
    const res = await fetch(API + '/location', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ code:myCode, lat, lng })
    });
    if (!res.ok) throw new Error('HTTP '+res.status);
    console.log('📍 Location sent to server:', lat, lng);
  } catch (e) {
    console.warn('Send location failed:', e);
  }
}

async function togglePublish() {
  if (!myProfile || !myCode) { toast('⚠️ Profil unvollständig'); return; }
  if (!myProfile.name || !myProfile.region) { toast('⚠️ Name und Region sind Pflicht'); return; }
  const btn = document.getElementById('publish-toggle');
  btn.style.pointerEvents = 'none';
  try {
    if (isPublished) { await unpublishProfile(); } else { await publishProfile(false); }
    updatePublishUI();
    await loadCommunity();
  } catch(e) { toast('⚠️ Fehler: ' + e.message); }
  finally { btn.style.pointerEvents = ''; }
}

async function publishProfile(silent=false) {
  const age = myProfile.year ? (new Date().getFullYear() - myProfile.year) : null;
  const payload = { code:myCode, name:myProfile.name, age, region:myProfile.region, province:myProfile.province||null, city:myProfile.city||null, orientation:myProfile.orientation||null, role:myProfile.role||null, trans:!!myProfile.trans, cross:!!myProfile.cross, bio:myProfile.bio||null };
  const res = await fetch(API + '/profile', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
  if (!res.ok) throw new Error('HTTP '+res.status);
  isPublished = true;
  localStorage.setItem('sm_spot_published', '1');
  if (!silent) toast('✅ Profil veröffentlicht');
}

async function unpublishProfile() {
  await fetch(API + '/profile/' + myCode, { method:'DELETE' });
  isPublished = false;
  localStorage.setItem('sm_spot_published', '0');
  toast('○ Profil entfernt');
}

async function loadCommunity() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  try {
    const res = await fetch(API + '/profiles');
    if (!res.ok) throw new Error('HTTP '+res.status);
    allProfiles = await res.json();
    for (const p of allProfiles) { if (p.code !== myCode) fetchLocationForProfile(p.code); }
    applyFilters();
  } catch(e) {
    document.getElementById('community-list').innerHTML = `<div class="state-box">Server nicht erreichbar</div>`;
  } finally { btn.classList.remove('spinning'); }
}

const locationCache = new Map();
async function fetchLocationForProfile(code) {
  try {
    const res = await fetch(API + '/location/' + code);
    if (res.ok) {
      const data = await res.json();
      locationCache.set(code, data);
      console.log(`📍 Location for ${code}:`, data);
    } else {
      locationCache.delete(code);
    }
  } catch { locationCache.delete(code); }
  renderCommunity();
}

function toggleChip(btn) { btn.classList.toggle('on'); applyFilters(); }
function applyFilters() {
  const region = document.getElementById('f-region').value;
  const ageRange = document.getElementById('f-age').value;
  const chips = [...document.querySelectorAll('.chip.on')].map(c => c.dataset.filter);
  filtered = allProfiles.filter(p => {
    if (myCode && p.code === myCode) return false;
    if (region && p.region !== region) return false;
    if (ageRange && p.age) {
      const [lo, hi] = ageRange === '50+' ? [50,999] : ageRange.split('-').map(Number);
      if (p.age < lo || p.age > hi) return false;
    }
    const o = chips.filter(f => ['homo','bi','hetero'].includes(f));
    if (o.length && (!p.orientation || !o.includes(p.orientation))) return false;
    const r = chips.filter(f => ['bottom','top','versatile'].includes(f));
    if (r.length && (!p.role || !r.includes(p.role))) return false;
    if (chips.includes('trans') && !p.trans) return false;
    return true;
  });
  renderCommunity();
}
function resetFilters() {
  document.getElementById('f-region').value = '';
  document.getElementById('f-age').value = '';
  document.querySelectorAll('.chip.on').forEach(c => c.classList.remove('on'));
  applyFilters();
}

let userPos = null;
function renderCommunity() {
  const list = document.getElementById('community-list');
  const n = filtered.length;
  document.getElementById('community-count').innerHTML = `<b>${n}</b> ${n===1?'Profil':'Profile'} gefunden`;
  if (!n) { list.innerHTML = '<div class="state-box">Keine Profile</div>'; return; }
  list.innerHTML = filtered.map(p => {
    const initial = p.name?.[0]?.toUpperCase() || '?';
    const age = p.age ? `${p.age} J.` : '? J.';
    const loc = [p.city, p.region].filter(Boolean).join(', ');
    const isOwn = p.code === myCode;
    const locData = locationCache.get(p.code);
    const locationBadge = (locData && !isOwn) ? `<span class="location-badge" onclick="showLocationOnMap('${p.code}', '${esc(p.name)}', ${locData.lat}, ${locData.lng})">📍 ${formatDistanceToUser(locData)}</span>` : '';
    const chatBtn = isOwn ? '<span style="font-size:.75rem;color:var(--muted)">Dein Profil</span>' : `<button class="btn-chat" onclick="startChat('${esc(p.code)}','${esc(p.name)}')">💬 Chat</button>`;
    return `<div class="profile-card"><div class="card-top"><div class="card-av">${esc(initial)}</div><div class="card-info"><div class="card-name">${esc(p.name)}${locationBadge}</div><div>${esc(age)} · ${esc(loc)}</div></div></div><div class="card-footer">${chatBtn}</div></div>`;
  }).join('');
}

let currentMap = null, userMarker = null, targetMarker = null;
function showLocationOnMap(code, name, lat, lng) {
  document.getElementById('location-modal-name').textContent = name;
  document.getElementById('location-modal').style.display = 'flex';
  setTimeout(() => {
    if (!currentMap) {
      currentMap = L.map('location-map-small').setView([lat, lng], 14);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution:'© OpenStreetMap' }).addTo(currentMap);
    } else currentMap.setView([lat, lng], 14);
    if (targetMarker) currentMap.removeLayer(targetMarker);
    targetMarker = L.marker([lat, lng], { icon: L.divIcon({ html:'<div style="background:#00e5c0;width:16px;height:16px;border-radius:50%;border:3px solid white;"></div>', iconSize:[22,22] }) }).addTo(currentMap).bindPopup(name).openPopup();
    if (userPos) {
      if (userMarker) currentMap.removeLayer(userMarker);
      userMarker = L.marker([userPos.lat, userPos.lng], { icon: L.divIcon({ html:'<div style="background:#3b82f6;width:16px;height:16px;border-radius:50%;border:3px solid white;"></div>', iconSize:[22,22] }) }).addTo(currentMap).bindPopup('Du');
    }
    document.getElementById('location-distance').textContent = userPos ? `Entfernung: ${formatDistance(getDistance(userPos.lat, userPos.lng, lat, lng))}` : '';
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(p => {
        userPos = { lat: p.coords.latitude, lng: p.coords.longitude };
        if (userMarker) currentMap.removeLayer(userMarker);
        userMarker = L.marker([userPos.lat, userPos.lng], { icon: L.divIcon({ html:'<div style="background:#3b82f6;width:16px;height:16px;border-radius:50%;border:3px solid white;"></div>', iconSize:[22,22] }) }).addTo(currentMap).bindPopup('Du');
        document.getElementById('location-distance').textContent = `Entfernung: ${formatDistance(getDistance(userPos.lat, userPos.lng, lat, lng))}`;
      }, () => {});
    }
  }, 100);
}
function closeLocationModal(e) { if (e && e.target !== document.getElementById('location-modal')) return; document.getElementById('location-modal').style.display = 'none'; }
function getDistance(lat1, lon1, lat2, lon2) { const R=6371e3, φ1=lat1*Math.PI/180, φ2=lat2*Math.PI/180, Δφ=(lat2-lat1)*Math.PI/180, Δλ=(lon2-lon1)*Math.PI/180; const a=Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2; return R*2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); }
function formatDistance(m) { return m<1000 ? Math.round(m)+' m' : (m/1000).toFixed(1)+' km'; }
function formatDistanceToUser(locData) { if (!userPos) return ''; return formatDistance(getDistance(userPos.lat, userPos.lng, locData.lat, locData.lng)); }
function startChat(code, name) { sessionStorage.setItem('sm_connect_to', code); window.location.href = CHAT_PAGE; }
function esc(s) { if (!s) return ''; const d=document.createElement('div'); d.textContent=String(s); return d.innerHTML; }
function toast(msg, ms=2800) { const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'), ms); }
</script>
</body>
</html>
