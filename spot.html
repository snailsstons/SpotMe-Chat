<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>SpotMe · Radar Community</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#060a0f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  
  <style>
    /* ─── SpotMe Design Tokens ─── */
    :root {
      --bg:      #060a0f;
      --sur:     #0c1219;
      --card:    #101820;
      --card2:   #141f2e;
      --bord:    rgba(255,255,255,.08);
      --bord2:   rgba(255,255,255,.13);
      --acc:     #00e5c0;
      --acc-dim: rgba(0,229,192,.12);
      --p2:      #7b5cfa;
      --p3:      #ff4f7b;
      --text:    #dde4f0;
      --muted:   #4e6070;
      --muted2:  #7a8fa8;
      --green:   #1ecc68;
      --touch:   52px;
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 17px; line-height: 1.5;
      height: 100vh; overflow: hidden; display: flex; flex-direction: column;
    }

    /* ─── Header ─── */
    .app-header {
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--bord);
      background: rgba(6,10,15,.96);
      backdrop-filter: blur(24px);
      flex-shrink: 0;
    }
    .logo {
      font-family: 'Syne', sans-serif; font-weight: 800; letter-spacing: 1px;
      font-size: 1.3rem; color: var(--acc);
    }
    .logo b { color: var(--text); font-weight: 800; }
    .status-badge {
      font-size: 0.65rem; font-weight: 600; letter-spacing: 1px;
      color: var(--acc); background: var(--acc-dim);
      padding: 0.25rem 0.8rem; border-radius: 100px;
      border: 1px solid rgba(0,229,192,.2);
    }

    /* ─── Profil‑Card (kompakt) ─── */
    .profile-bar {
      padding: 0.75rem 1.25rem;
      background: var(--card); border-bottom: 1px solid var(--bord);
      display: flex; align-items: center; gap: 0.8rem; flex-shrink: 0;
    }
    .profile-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: linear-gradient(135deg, var(--p2), var(--p3));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; border: 2px solid var(--bord2); flex-shrink: 0;
      overflow: hidden;
    }
    .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .profile-info { flex: 1; min-width: 0; }
    .profile-name {
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.95rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .profile-meta {
      font-size: 0.75rem; color: var(--muted2);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .profile-actions {
      display: flex; gap: 6px;
    }
    .icon-btn {
      width: 36px; height: 36px; border-radius: 10px;
      border: 1px solid var(--bord2); background: rgba(255,255,255,.04);
      color: var(--muted2); font-size: 1.1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .icon-btn.active { background: var(--acc); color: var(--bg); border-color: var(--acc); }
    .icon-btn:active { background: rgba(255,255,255,.09); }

    /* ─── Radar Viewport ─── */
    .radar-viewport {
      flex: 1; position: relative;
      display: flex; align-items: center; justify-content: center;
      padding: 0.5rem;
    }
    .radar-canvas {
      position: relative; width: 100%; height: 100%;
      max-width: min(80vw, 80vh); max-height: min(80vw, 80vh);
      aspect-ratio: 1/1;
    }
    .radar-bg {
      position: absolute; inset: 0; border-radius: 50%;
      background: radial-gradient(circle at center, rgba(0,229,192,.03) 0%, transparent 70%);
      border: 1px solid rgba(0,229,192,.15);
      box-shadow: 0 0 40px rgba(0,0,0,.5);
    }
    .ring {
      position: absolute; inset: 0; border: 1px solid rgba(0,229,192,.08); border-radius: 50%;
    }
    .ring-label {
      position: absolute; left: 50%; transform: translateX(-50%);
      color: var(--acc); font-size: 0.6rem; opacity: 0.5;
      background: var(--bg); padding: 0 4px;
    }
    .radar-sweep {
      position: absolute; inset: 0; border-radius: 50%;
      background: conic-gradient(from 0deg, transparent 0%, rgba(0,229,192,.08) 100%);
      animation: sweep 8s linear infinite;
      pointer-events: none;
    }
    @keyframes sweep { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .center-dot {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 14px; height: 14px; background: white; border-radius: 50%;
      box-shadow: 0 0 20px var(--acc); border: 2px solid var(--bg); z-index: 10;
    }

    /* Peer Nodes */
    .peer-node {
      position: absolute; width: 14px; height: 14px; margin-left: -7px; margin-top: -7px;
      background: var(--acc); border-radius: 50%;
      box-shadow: 0 0 12px var(--acc); cursor: pointer;
      z-index: 50; transition: transform 0.2s;
      border: 2px solid var(--bg);
    }
    .peer-node:active { transform: scale(1.4); }
    .peer-node::after {
      content: attr(data-label); position: absolute; top: 18px; left: 50%;
      transform: translateX(-50%); font-size: 0.65rem; white-space: nowrap;
      background: var(--card2); padding: 2px 8px; border-radius: 12px;
      border: 1px solid var(--bord2); color: var(--text);
      pointer-events: none; opacity: 0; transition: opacity 0.15s;
    }
    .peer-node:hover::after { opacity: 1; }

    /* ─── Filter Drawer ─── */
    .filter-drawer {
      background: var(--card); border-top: 1px solid var(--bord);
      padding: 1rem 1.25rem; flex-shrink: 0;
    }
    .filter-title {
      font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 0.75rem;
    }
    .filter-row {
      display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px;
      scrollbar-width: none;
    }
    .filter-chip {
      background: var(--sur); border: 1.5px solid var(--bord2);
      padding: 6px 14px; border-radius: 20px; font-size: 0.8rem;
      white-space: nowrap; color: var(--muted2); cursor: pointer;
      transition: all 0.15s; user-select: none;
    }
    .filter-chip.active {
      background: var(--acc-dim); border-color: var(--acc); color: var(--acc);
    }
    .filter-select-row {
      display: flex; gap: 8px; margin-bottom: 10px;
    }
    .filter-select {
      flex: 1; padding: 8px 12px; background: var(--sur);
      border: 1.5px solid var(--bord2); border-radius: 12px;
      color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.85rem;
    }
    .reset-link {
      font-size: 0.75rem; color: var(--muted2); background: none; border: none;
      padding: 4px 8px; cursor: pointer;
    }

    /* ─── Bottom Navigation ─── */
    nav {
      display: flex; justify-content: space-around; padding: 0.5rem 0 1.2rem;
      border-top: 1px solid var(--bord); background: var(--bg); flex-shrink: 0;
    }
    .nav-btn {
      background: none; border: none; color: var(--muted2); opacity: 0.5;
      font-family: 'Syne', sans-serif; font-size: 0.8rem; letter-spacing: 1px;
      cursor: pointer; padding: 8px 16px; border-radius: 12px; transition: all 0.15s;
    }
    .nav-btn.active { opacity: 1; color: var(--acc); background: var(--acc-dim); }

    /* ─── Modal (wie in spot.html) ─── */
    .location-modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.8);
      z-index: 1000; display: none; align-items: center; justify-content: center;
      backdrop-filter: blur(4px);
    }
    .location-modal {
      background: var(--card2); border: 1px solid var(--bord2);
      border-radius: 24px; padding: 1.5rem; width: 90%; max-width: 400px;
    }
    .location-modal.inside { background: rgba(30, 204, 104, 0.08); border-color: var(--green); }
    .location-modal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1rem;
    }
    .location-modal-title { font-family: 'Syne', sans-serif; font-weight: 700; color: var(--acc); }
    .location-modal-close {
      width: 32px; height: 32px; border-radius: 50%;
      background: rgba(255,255,255,.1); border: none; color: var(--text);
      font-size: 1.2rem; cursor: pointer;
    }
    #location-map-small { height: 200px; border-radius: 12px; margin-bottom: 1rem; }
    .location-distance {
      text-align: center; font-weight: 600; padding: 0.5rem;
      border-radius: 12px; margin-bottom: 0.8rem;
    }
    .location-distance.inside { background: rgba(30, 204, 104, 0.15); color: var(--green); }
    .checkin-btn {
      width: 100%; padding: 0.8rem; border: none; border-radius: 12px;
      background: var(--acc); color: var(--bg); font-weight: 700; font-size: 0.95rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      gap: 0.4rem; transition: all 0.2s;
    }

    .toast {
      position: fixed; bottom: 2.5rem; left: 50%; transform: translateX(-50%);
      background: var(--card2); border: 1px solid var(--bord2);
      border-radius: 100px; padding: 0.6rem 1.5rem; font-size: 0.85rem;
      z-index: 9999; transition: all 0.3s; opacity: 0; pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(-10px); }
  </style>
</head>
<body>

<!-- Header -->
<header class="app-header">
  <div class="logo">SPOT<b>ME</b> <span style="font-weight:300; opacity:0.5; font-size:0.9rem;">RADAR</span></div>
  <div class="status-badge" id="status-indicator">● DISCOVERY</div>
</header>

<!-- Kompakte Profil-Info (wird dynamisch gefüllt) -->
<div class="profile-bar" id="profile-bar" style="display:none;">
  <div class="profile-avatar" id="my-avatar-small">🧑</div>
  <div class="profile-info">
    <div class="profile-name" id="my-name-small">—</div>
    <div class="profile-meta" id="my-meta-small">—</div>
  </div>
  <div class="profile-actions">
    <button class="icon-btn" id="publish-toggle-small" onclick="togglePublish()" title="Sichtbarkeit">👁️</button>
    <button class="icon-btn" id="location-toggle-small" onclick="toggleLocationSharing()" title="Standort teilen">📍</button>
    <button class="icon-btn" onclick="window.location.href='profil.html'" title="Profil bearbeiten">✎</button>
  </div>
</div>

<!-- Radar -->
<div class="radar-viewport">
  <div class="radar-canvas" id="radar-field">
    <div class="radar-bg"></div>
    <div class="ring" style="inset: 0;"></div><span class="ring-label" style="top:2%;">5 km</span>
    <div class="ring" style="inset: 20%;"></div><span class="ring-label" style="top:22%;">1 km</span>
    <div class="ring" style="inset: 45%;"></div><span class="ring-label" style="top:47%;">500 m</span>
    <div class="ring" style="inset: 75%;"></div><span class="ring-label" style="top:77%;">100 m</span>
    <div class="radar-sweep"></div>
    <div class="center-dot"></div>
    <!-- Nodes werden per JS eingefügt -->
  </div>
</div>

<!-- Filter -->
<div class="filter-drawer">
  <div class="filter-title">Community Filter</div>
  <div class="filter-select-row">
    <select class="filter-select" id="f-region" onchange="applyFilters()"><option value="">Alle Regionen</option></select>
    <select class="filter-select" id="f-age" onchange="applyFilters()">
      <option value="">Alle Altersgruppen</option>
      <option value="18-29">18–29</option>
      <option value="30-39">30–39</option>
      <option value="40-49">40–49</option>
      <option value="50+">50+</option>
    </select>
  </div>
  <div class="filter-row" id="filter-chips">
    <div class="filter-chip" data-filter="homo" onclick="toggleChip(this)">🏳️‍🌈 Homo</div>
    <div class="filter-chip" data-filter="bi" onclick="toggleChip(this)">Bi</div>
    <div class="filter-chip" data-filter="hetero" onclick="toggleChip(this)">Hetero</div>
    <div class="filter-chip" data-filter="bottom" onclick="toggleChip(this)">Bottom</div>
    <div class="filter-chip" data-filter="top" onclick="toggleChip(this)">Top</div>
    <div class="filter-chip" data-filter="versatile" onclick="toggleChip(this)">Versatile</div>
    <div class="filter-chip" data-filter="trans" onclick="toggleChip(this)">Trans</div>
  </div>
  <button class="reset-link" onclick="resetFilters()">✕ Filter zurücksetzen</button>
</div>

<!-- Navigation -->
<nav>
  <button class="nav-btn active">RADAR</button>
  <button class="nav-btn" onclick="location.href='index.html'">CHAT</button>
  <button class="nav-btn" onclick="location.href='profil.html'">PROFIL</button>
</nav>

<!-- Modal -->
<div class="location-modal-overlay" id="location-modal" onclick="closeLocationModal(event)">
  <div class="location-modal" id="location-modal-content" onclick="event.stopPropagation()">
    <div class="location-modal-header">
      <div class="location-modal-title" id="location-modal-name">Standort</div>
      <button class="location-modal-close" onclick="closeLocationModal()">✕</button>
    </div>
    <div id="location-map-small"></div>
    <div class="location-distance" id="location-distance"></div>
    <button class="checkin-btn" id="checkin-btn" onclick="performCheckIn()">📍 Hier einchecken</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';

// ─────────────────────────────────────────────────────────────────────────────
// API & Globals (identisch zu spot.html)
// ─────────────────────────────────────────────────────────────────────────────
const API = 'https://spotme-chat.onrender.com/api';
const PROFILE_KEY = 'sm_profile';
const KEEPALIVE_INTERVAL = 8 * 60 * 1000;
const LOCATION_UPDATE_INTERVAL = 30000;
const DEFAULT_RADIUS = 500;

let myProfile = null;
let myCode = localStorage.getItem('sm_code') || '';
let isPublished = false;
let isSharingLocation = false;
let allProfiles = [];
let filtered = [];
let keepaliveTimer = null;
let locationTimer = null;
let locationWatchId = null;
let userPosition = null;           // eigene Position {lat, lng}

// Modal & Map
let currentTargetCode = null;
let currentTargetLat = null, currentTargetLng = null;
let currentMap = null, userMarker = null, targetMarker = null;

// Regionen für Filter
const REGIONS = [
  'Andalusien','Aragón','Asturien','Balearen','Baskenland',
  'Extremadura','Galicien','Kanaren','Kantabrien',
  'Kastilien-La Mancha','Kastilien-León','Katalonien',
  'La Rioja','Madrid','Murcia','Navarra','Valencia (Region)'
];

// Cache für Positionen anderer Nutzer
const locationCache = new Map();

// ─────────────────────────────────────────────────────────────────────────────
// Initialisierung
// ─────────────────────────────────────────────────────────────────────────────
window.addEventListener('load', async () => {
  buildRegionFilter();
  loadMyProfile();
  await loadCommunity();
  if (isPublished && myProfile) await verifyAndRepublish();
  startKeepalive();
  
  // Standort-Freigabe aus localStorage wiederherstellen
  isSharingLocation = localStorage.getItem('sm_spot_location') === '1';
  updateLocationUI();
  if (isSharingLocation) {
    startLocationSharing().then(() => {
      // Nachdem eigene Position da ist, Radar neu zeichnen
      renderRadar();
    });
  }
  
  // Initial Radar rendern (auch ohne eigene Position werden Nodes angezeigt)
  renderRadar();
});

function buildRegionFilter() {
  const sel = document.getElementById('f-region');
  REGIONS.forEach(r => { const o = document.createElement('option'); o.value = o.textContent = r; sel.appendChild(o); });
}

// ─────────────────────────────────────────────────────────────────────────────
// Profil laden & UI
// ─────────────────────────────────────────────────────────────────────────────
function loadMyProfile() {
  const raw = localStorage.getItem(PROFILE_KEY);
  if (!raw) {
    document.getElementById('profile-bar').style.display = 'none';
    return;
  }
  try { myProfile = JSON.parse(raw); } catch { return; }
  document.getElementById('profile-bar').style.display = 'flex';
  
  const av = document.getElementById('my-avatar-small');
  if (myProfile.avatar) av.innerHTML = `<img src="${myProfile.avatar}" alt="Avatar">`;
  else av.textContent = myProfile.name ? myProfile.name[0].toUpperCase() : '🧑';
  
  document.getElementById('my-name-small').textContent = myProfile.name || '—';
  const age = myProfile.year ? (new Date().getFullYear() - myProfile.year) : null;
  const loc = [myProfile.city, myProfile.region].filter(Boolean).join(', ');
  const meta = [age ? age + ' J.' : null, loc].filter(Boolean).join(' · ');
  document.getElementById('my-meta-small').textContent = meta || 'Kein Ort angegeben';
  
  isPublished = localStorage.getItem('sm_spot_published') === '1';
  updatePublishUI();
}

function updatePublishUI() {
  const btn = document.getElementById('publish-toggle-small');
  btn.classList.toggle('active', isPublished);
  btn.title = isPublished ? 'In Community sichtbar' : 'Nicht sichtbar';
}

function updateLocationUI() {
  const btn = document.getElementById('location-toggle-small');
  btn.classList.toggle('active', isSharingLocation);
  btn.title = isSharingLocation ? 'Standort wird geteilt' : 'Standort teilen';
}

// ─────────────────────────────────────────────────────────────────────────────
// Publish / Unpublish
// ─────────────────────────────────────────────────────────────────────────────
async function togglePublish() {
  if (!myProfile || !myCode) { toast('⚠️ Profil unvollständig'); return; }
  if (!myProfile.name || !myProfile.region) { toast('⚠️ Profilname und Region sind Pflicht'); return; }
  const btn = document.getElementById('publish-toggle-small');
  btn.style.opacity = '.5'; btn.style.pointerEvents = 'none';
  try {
    if (isPublished) {
      await fetch(API + '/profile/' + myCode, { method: 'DELETE' });
      isPublished = false;
      localStorage.setItem('sm_spot_published', '0');
      toast('○ Profil aus Community entfernt');
    } else {
      const age = myProfile.year ? (new Date().getFullYear() - myProfile.year) : null;
      const payload = {
        code: myCode, name: myProfile.name, age,
        region: myProfile.region, province: myProfile.province || null, city: myProfile.city || null,
        orientation: myProfile.orientation || null, role: myProfile.role || null,
        trans: myProfile.trans || false, cross: myProfile.cross || false, bio: myProfile.bio || null
      };
      const res = await fetch(API + '/profile', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      isPublished = true;
      localStorage.setItem('sm_spot_published', '1');
      toast('✅ Profil veröffentlicht');
    }
    updatePublishUI();
    await loadCommunity();
    renderRadar();
  } catch(e) { toast('⚠️ Fehler: ' + e.message); }
  finally { btn.style.opacity = ''; btn.style.pointerEvents = ''; }
}

// ─────────────────────────────────────────────────────────────────────────────
// Standort teilen
// ─────────────────────────────────────────────────────────────────────────────
async function toggleLocationSharing() {
  if (!myProfile || !myCode) { toast('⚠️ Profil unvollständig'); return; }
  if (isSharingLocation) {
    stopLocationSharing();
    isSharingLocation = false;
    localStorage.setItem('sm_spot_location', '0');
    updateLocationUI();
    toast('📍 Standortfreigabe beendet');
    userPosition = null;
    renderRadar();
  } else {
    const success = await startLocationSharing();
    if (success) {
      isSharingLocation = true;
      localStorage.setItem('sm_spot_location', '1');
      updateLocationUI();
      toast('📍 Standort wird geteilt');
      renderRadar();
    }
  }
}

async function startLocationSharing() {
  if (!navigator.geolocation) { toast('❌ Geolocation nicht unterstützt'); return false; }
  try {
    const pos = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej, { enableHighAccuracy: true }));
    userPosition = { lat: pos.coords.latitude, lng: pos.coords.longitude };
    await sendLocationToServer(userPosition.lat, userPosition.lng);
    
    if (locationWatchId) navigator.geolocation.clearWatch(locationWatchId);
    locationWatchId = navigator.geolocation.watchPosition(
      async (pos) => {
        userPosition = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        await sendLocationToServer(userPosition.lat, userPosition.lng);
        renderRadar();
      },
      (err) => console.warn('Location watch error:', err),
      { enableHighAccuracy: true, maximumAge: 30000 }
    );
    
    if (locationTimer) clearInterval(locationTimer);
    locationTimer = setInterval(async () => {
      const pos = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej, { enableHighAccuracy: true })).catch(() => null);
      if (pos) {
        userPosition = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        await sendLocationToServer(userPosition.lat, userPosition.lng);
        renderRadar();
      }
    }, LOCATION_UPDATE_INTERVAL);
    return true;
  } catch (e) { toast('⚠️ Standort nicht verfügbar'); return false; }
}

function stopLocationSharing() {
  if (locationWatchId) { navigator.geolocation.clearWatch(locationWatchId); locationWatchId = null; }
  if (locationTimer) { clearInterval(locationTimer); locationTimer = null; }
}

async function sendLocationToServer(lat, lng) {
  try {
    await fetch(API + '/location', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code: myCode, lat, lng })
    });
  } catch(e) {}
}

// ─────────────────────────────────────────────────────────────────────────────
// Community laden
// ─────────────────────────────────────────────────────────────────────────────
async function loadCommunity() {
  try {
    const res = await fetch(API + '/profiles');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    allProfiles = await res.json();
    // Für alle Profile den Standort abrufen (parallel)
    await Promise.all(allProfiles.map(p => fetchLocationForProfile(p.code)));
    applyFilters();
  } catch(e) {
    console.warn('Community load error', e);
  }
}

async function fetchLocationForProfile(code) {
  if (locationCache.has(code)) return locationCache.get(code);
  try {
    const res = await fetch(API + '/location/' + code);
    if (res.ok) {
      const data = await res.json();
      locationCache.set(code, data);
      return data;
    }
  } catch(e) {}
  locationCache.set(code, null);
  return null;
}

// ─────────────────────────────────────────────────────────────────────────────
// Filter & Rendering (Radar)
// ─────────────────────────────────────────────────────────────────────────────
function toggleChip(el) {
  el.classList.toggle('active');
  applyFilters();
}

function applyFilters() {
  const region = document.getElementById('f-region').value;
  const ageRange = document.getElementById('f-age').value;
  const chips = [...document.querySelectorAll('.filter-chip.active')].map(c => c.dataset.filter);
  
  filtered = allProfiles.filter(p => {
    if (myCode && p.code === myCode) return false;
    if (region && p.region !== region) return false;
    if (ageRange && p.age) {
      const [lo, hi] = ageRange === '50+' ? [50,999] : ageRange.split('-').map(Number);
      if (p.age < lo || p.age > hi) return false;
    }
    const oCh = chips.filter(f => ['homo','bi','hetero'].includes(f));
    if (oCh.length && (!p.orientation || !oCh.includes(p.orientation))) return false;
    const rCh = chips.filter(f => ['bottom','top','versatile'].includes(f));
    if (rCh.length && (!p.role || !rCh.includes(p.role))) return false;
    if (chips.includes('trans') && !p.trans) return false;
    return true;
  });
  renderRadar();
}

function resetFilters() {
  document.getElementById('f-region').value = '';
  document.getElementById('f-age').value = '';
  document.querySelectorAll('.filter-chip.active').forEach(c => c.classList.remove('active'));
  applyFilters();
}

// ─────────────────────────────────────────────────────────────────────────────
// Radar Visualisierung
// ─────────────────────────────────────────────────────────────────────────────
function renderRadar() {
  const field = document.getElementById('radar-field');
  // Alte Nodes entfernen
  field.querySelectorAll('.peer-node').forEach(n => n.remove());
  
  const maxDist = 5000; // 5 km entspricht äußerem Ring
  
  filtered.forEach(profile => {
    const loc = locationCache.get(profile.code);
    if (!loc) return; // nur Profile mit Standort anzeigen
    
    // Distanz berechnen (falls eigene Position bekannt)
    let distance = null;
    if (userPosition) {
      distance = getDistance(userPosition.lat, userPosition.lng, loc.lat, loc.lng);
    } else {
      // Fallback: zufällige Distanz, aber konsistent (Hash aus Code)
      const hash = profile.code.split('').reduce((a,b) => a + b.charCodeAt(0), 0);
      distance = (hash % 4000) + 500; // 500–4500 m
    }
    
    // Position auf Radar berechnen
    const normalized = Math.min(distance, maxDist) / maxDist; // 0 (Mitte) bis 1 (Rand)
    const radiusPercent = (1 - normalized) * 50; // 50% = Mitte, 0% = Rand
    
    // Winkel stabil aus Code ableiten
    const angle = (profile.code.split('').reduce((a,b) => a + b.charCodeAt(0), 0) % 360) * (Math.PI / 180);
    
    const x = 50 + (Math.cos(angle) * (normalized * 50));
    const y = 50 + (Math.sin(angle) * (normalized * 50));
    
    const node = document.createElement('div');
    node.className = 'peer-node';
    node.style.left = x + '%';
    node.style.top = y + '%';
    node.setAttribute('data-label', `${profile.name || '?'} (${formatDistance(distance)})`);
    node.onclick = () => showLocationOnMap(profile.code, profile.name, loc.lat, loc.lng);
    field.appendChild(node);
  });
  
  // Status aktualisieren
  const status = document.getElementById('status-indicator');
  status.textContent = `● ${filtered.length} PROFILES`;
}

// ─────────────────────────────────────────────────────────────────────────────
// Modal & Check‑In (identisch zu spot.html)
// ─────────────────────────────────────────────────────────────────────────────
function showLocationOnMap(code, name, lat, lng) {
  currentTargetCode = code;
  currentTargetLat = lat;
  currentTargetLng = lng;
  
  const modal = document.getElementById('location-modal');
  const modalContent = document.getElementById('location-modal-content');
  document.getElementById('location-modal-name').textContent = name;
  modal.style.display = 'flex';
  modalContent.classList.remove('inside');
  document.getElementById('location-distance').classList.remove('inside');
  
  setTimeout(() => {
    if (!currentMap) {
      currentMap = L.map('location-map-small').setView([lat, lng], 14);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(currentMap);
    } else {
      currentMap.setView([lat, lng], 14);
    }
    if (targetMarker) currentMap.removeLayer(targetMarker);
    targetMarker = L.marker([lat, lng], {
      icon: L.divIcon({ html: '<div style="background:#00e5c0;width:16px;height:16px;border-radius:50%;border:3px solid white;"></div>', iconSize: [22,22] })
    }).addTo(currentMap).bindPopup(name).openPopup();
    
    updateModalDistance();
    if (!userPosition) {
      document.getElementById('location-distance').textContent = 'Tippe auf "Einchecken" für deine Position';
    }
  }, 100);
}

async function performCheckIn() {
  const btn = document.getElementById('checkin-btn');
  btn.textContent = '⏳ Position wird ermittelt...';
  btn.disabled = true;
  
  if (!navigator.geolocation) {
    toast('❌ Geolocation nicht unterstützt');
    btn.textContent = '📍 Hier einchecken';
    btn.disabled = false;
    return;
  }
  
  try {
    const pos = await new Promise((res, rej) => 
      navigator.geolocation.getCurrentPosition(res, rej, { enableHighAccuracy: true, timeout: 10000 })
    );
    userPosition = { lat: pos.coords.latitude, lng: pos.coords.longitude };
    
    if (myCode) {
      await sendLocationToServer(userPosition.lat, userPosition.lng);
      if (!isSharingLocation) {
        isSharingLocation = true;
        localStorage.setItem('sm_spot_location', '1');
        updateLocationUI();
        startLocationSharing();
      }
    }
    
    if (userMarker) currentMap.removeLayer(userMarker);
    userMarker = L.marker([userPosition.lat, userPosition.lng], {
      icon: L.divIcon({ html: '<div style="background:#3b82f6;width:16px;height:16px;border-radius:50%;border:3px solid white;"></div>', iconSize: [22,22] })
    }).addTo(currentMap).bindPopup('Du').openPopup();
    
    updateModalDistance();
    toast('✅ Eingecheckt! Deine Position ist jetzt sichtbar.');
    renderRadar(); // Radar mit neuer eigener Position aktualisieren
  } catch (e) {
    toast('❌ Standort konnte nicht ermittelt werden');
  } finally {
    btn.textContent = '📍 Hier einchecken';
    btn.disabled = false;
  }
}

function updateModalDistance() {
  if (!userPosition || !currentTargetLat || !currentTargetLng) return;
  const dist = getDistance(userPosition.lat, userPosition.lng, currentTargetLat, currentTargetLng);
  const inside = dist <= DEFAULT_RADIUS;
  const distEl = document.getElementById('location-distance');
  distEl.textContent = `Entfernung: ${formatDistance(dist)} ${inside ? '– Ihr seid im Radius! 🎉' : ''}`;
  const modalContent = document.getElementById('location-modal-content');
  if (inside) {
    distEl.classList.add('inside');
    modalContent.classList.add('inside');
  } else {
    distEl.classList.remove('inside');
    modalContent.classList.remove('inside');
  }
}

function closeLocationModal(e) {
  if (e && e.target !== document.getElementById('location-modal')) return;
  document.getElementById('location-modal').style.display = 'none';
}

// ─────────────────────────────────────────────────────────────────────────────
// Hilfsfunktionen
// ─────────────────────────────────────────────────────────────────────────────
function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371e3, φ1 = lat1 * Math.PI/180, φ2 = lat2 * Math.PI/180;
  const Δφ = (lat2-lat1) * Math.PI/180, Δλ = (lon2-lon1) * Math.PI/180;
  const a = Math.sin(Δφ/2) ** 2 + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function formatDistance(m) {
  if (m < 1000) return Math.round(m) + ' m';
  return (m/1000).toFixed(1) + ' km';
}

function startKeepalive() {
  if (keepaliveTimer) clearInterval(keepaliveTimer);
  keepaliveTimer = setInterval(async () => {
    if (isPublished && myProfile) {
      try { 
        const age = myProfile.year ? (new Date().getFullYear() - myProfile.year) : null;
        await fetch(API + '/profile', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            code: myCode, name: myProfile.name, age,
            region: myProfile.region, province: myProfile.province || null, city: myProfile.city || null,
            orientation: myProfile.orientation || null, role: myProfile.role || null,
            trans: myProfile.trans || false, cross: myProfile.cross || false, bio: myProfile.bio || null
          })
        });
      } catch(e) {}
    }
    await loadCommunity();
  }, KEEPALIVE_INTERVAL);
}

async function verifyAndRepublish() {
  try {
    const res = await fetch(API + '/profile/' + myCode);
    if (res.status === 404) {
      await togglePublish(); // neu veröffentlichen
    }
  } catch(e) {}
}

function toast(msg, ms = 2800) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(window.toastTimer);
  window.toastTimer = setTimeout(() => el.classList.remove('show'), ms);
}

function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = String(s); return d.innerHTML; }
