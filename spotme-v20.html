<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>SpotMe · Chat v20</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#060a0f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SpotMe V20">

<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.4/peerjs.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
/* ════════════════════════════════
   DESIGN TOKENS (Base V18)
════════════════════════════════ */
:root {
  --bg:     #060a0f;
  --sur:    #0c1219;
  --card:   #101820;
  --card2:  #141f2e;
  --bord:   rgba(255,255,255,.08);
  --bord2:  rgba(255,255,255,.13);
  --acc:    #00e5c0;
  --acc-dim: rgba(0,229,192,.12);
  --p2:     #7b5cfa;
  --p3:     #ff4f7b;
  --text:   #dde4f0;
  --muted:  #4e6070;
  --muted2: #7a8fa8;
  --green:  #1ecc68;
  --touch:  52px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent }
html, body {
  height:100%; overflow:hidden;
  font-family:'DM Sans', sans-serif;
  background:var(--bg); color:var(--text);
  font-size:17px; line-height:1.5;
  overscroll-behavior-y:contain;
}

.screen { display:none; position:fixed; inset:0; flex-direction:column; background:var(--bg) }
.screen.active { display:flex; animation:sIn .22s ease }
@keyframes sIn { from{opacity:0;transform:translateX(12px)} to{opacity:1;transform:none} }
.inner { flex:1; overflow-y:auto; padding:1.5rem 1.25rem 6rem; max-width:480px; width:100%; margin:0 auto }

/* BRAND & HERO */
.brand { display:flex; align-items:center; gap:.55rem; margin-bottom:2.25rem; position:relative }
.bdot { width:9px; height:9px; border-radius:50%; background:var(--acc); box-shadow:0 0 14px var(--acc); animation:blink 2.2s ease infinite }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }
.bname { font-family:'Syne',sans-serif; font-weight:800; font-size:1.3rem; color:var(--acc); letter-spacing:-.02em }
.hero-title { font-family:'Syne',sans-serif; font-weight:800; font-size:2.3rem; letter-spacing:-.03em; line-height:1.08; margin-bottom:.6rem }
.hero-sub { color:var(--muted2); font-size:.95rem; font-weight:300; line-height:1.65; margin-bottom:1.75rem }

/* CODE CARD */
.code-card {
  background:linear-gradient(135deg, rgba(0,229,192,.07) 0%, rgba(123,92,250,.07) 100%);
  border:1px solid rgba(0,229,192,.18);
  border-radius:22px; padding:1.6rem 1.4rem; text-align:center; margin-bottom:1.4rem;
  position:relative; overflow:hidden;
}
.code-value { font-family:'Syne',sans-serif; font-weight:800; font-size:2.2rem; letter-spacing:.1em; color:var(--acc); margin-bottom:.85rem }

/* MISSED CALLS (New in V20) */
.missed-section { margin-top:1.4rem; display:none; }
.missed-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:.6rem }
.missed-label { font-size:.73rem; font-weight:600; text-transform:uppercase; letter-spacing:.09em; color:var(--p3); display:flex; align-items:center; gap:.45rem }
.missed-dot { width:7px; height:7px; border-radius:50%; background:var(--p3); animation:blink .9s ease infinite }
.missed-clear-btn { font-size:.72rem; color:var(--muted2); background:none; border:none; cursor:pointer; font-family:inherit }
.missed-item {
  display:flex; align-items:center; gap:.8rem;
  padding:.75rem .9rem; border-radius:14px; border:1px solid rgba(255,79,123,.15);
  background:rgba(255,79,123,.04); margin-bottom:.45rem;
  cursor:pointer; transition:background .15s;
}
.missed-item:active { background:rgba(255,79,123,.09) }
.missed-av { width:38px; height:38px; border-radius:50%; background:rgba(255,79,123,.15); display:flex; align-items:center; justify-content:center; font-size:.9rem }
.missed-info { flex:1; min-width:0 }
.missed-name { font-size:.9rem; font-weight:600 }
.missed-time { font-size:.75rem; color:var(--muted2) }

/* Standard UI Elements from V18... */
.conn-box { background:var(--card); border:1px solid var(--bord); border-radius:18px; padding:1.3rem; margin-bottom:1.4rem }
.dinp { width:46px; height:56px; border-radius:11px; border:1.5px solid var(--bord2); background:var(--sur); color:var(--text); font-family:'Syne',sans-serif; font-size:1.55rem; font-weight:700; text-align:center; outline:none }
.dinp:focus { border-color:var(--acc) }
.btn-main { display:flex; align-items:center; justify-content:center; width:100%; padding:.9rem; border-radius:13px; border:none; font-weight:700; background:var(--acc); color:var(--bg); cursor:pointer; min-height:var(--touch) }

/* INCOMING CALL SCREEN */
.call-wrap { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:2.5rem 2rem }
.caller-ring { width:100px; height:100px; border-radius:50%; background:linear-gradient(135deg,var(--p2),var(--p3)); display:flex; align-items:center; justify-content:center; font-size:2.8rem; margin-bottom:2rem; position:relative; animation:ringPulse 2s ease infinite }
@keyframes ringPulse { 0%,100%{box-shadow:0 0 0 0 rgba(123,92,250,.4)} 50%{box-shadow:0 0 0 12px rgba(123,92,250,.0)} }
.call-btns { display:grid; grid-template-columns:1fr 1fr; gap:1rem; width:100%; max-width:300px }
.call-btn { padding:1rem; border-radius:16px; border:none; font-weight:700; cursor:pointer; min-height:58px; color:#fff }
.btn-accept { background:var(--green) }
.btn-decline { background:var(--p3) }

/* CHAT SCREEN */
.chat-bar { display:flex; align-items:center; gap:.8rem; padding:1rem 1.1rem; background:rgba(6,10,15,.8); backdrop-filter:blur(20px); border-bottom:1px solid var(--bord) }
#messages { flex:1; overflow-y:auto; padding:1.25rem; display:flex; flex-direction:column; gap:.8rem }
.msg { max-width:85%; padding:.75rem 1rem; border-radius:18px; font-size:.95rem; position:relative }
.msg.own { align-self:flex-end; background:var(--acc); color:var(--bg); border-bottom-right-radius:4px }
.msg.remote { align-self:flex-start; background:var(--card2); border-bottom-left-radius:4px }
.chat-input-area { padding:1rem; background:var(--sur); border-top:1px solid var(--bord); display:flex; gap:.7rem; align-items:flex-end }
#chat-inp { flex:1; background:var(--card); border:1px solid var(--bord2); border-radius:14px; padding:.75rem 1rem; color:var(--text); outline:none; resize:none; max-height:120px }

/* TOAST */
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:rgba(255,255,255,.95); color:#000; padding:.7rem 1.2rem; border-radius:12px; font-size:.9rem; font-weight:600; z-index:1000; box-shadow:0 10px 30px rgba(0,0,0,.4); animation:tIn .25s ease }
@keyframes tIn { from{opacity:0;transform:translate(-50%,15px)} }
</style>
</head>
<body>

<div id="s-home" class="screen active">
  <div class="inner">
    <div class="brand">
      <div class="bdot"></div>
      <div class="bname">Spot<b>Me</b></div>
    </div>
    
    <div class="hero-title">Hey! 👋</div>
    <div class="hero-sub">Teile deinen Code, um einen verschlüsselten Chat zu starten.</div>

    <div class="code-card">
      <div class="code-label">DEIN CODE</div>
      <div id="my-code-display" class="code-value">--- · ---</div>
      <div class="code-actions">
        <button class="csbtn" onclick="copyCode()">📋 Kopieren</button>
        <button class="csbtn" onclick="shareCode()">🔗 Teilen</button>
      </div>
    </div>

    <div class="missed-section">
      <div class="missed-header">
        <div class="missed-label"><div class="missed-dot"></div> Verpasste Anrufe</div>
        <button class="missed-clear-btn" onclick="clearMissed()">Löschen</button>
      </div>
      <div id="missed-list"></div>
    </div>

    <div class="conn-box">
      <div class="conn-label">Partner Code</div>
      <div class="drow">
        <input class="dinp" maxlength="1" inputmode="numeric">
        <input class="dinp" maxlength="1" inputmode="numeric">
        <input class="dinp" maxlength="1" inputmode="numeric">
        <div style="width:10px"></div>
        <input class="dinp" maxlength="1" inputmode="numeric">
        <input class="dinp" maxlength="1" inputmode="numeric">
        <input class="dinp" maxlength="1" inputmode="numeric">
      </div>
      <button id="cbtn" class="btn-main" onclick="connectToPeer()" disabled>Verbinden</button>
    </div>

    <div class="prev-label">Letzte Chats</div>
    <div id="prev-list"></div>
  </div>
</div>

<div id="s-call" class="screen">
  <div class="call-wrap">
    <div class="caller-ring">📞</div>
    <div id="call-name" class="caller-name">Anruf...</div>
    <div id="call-code" class="caller-code">--- ---</div>
    <div class="call-btns">
      <button class="call-btn btn-decline" onclick="declineCall()">Ablehnen</button>
      <button class="call-btn btn-accept" onclick="acceptCall()">Annehmen</button>
    </div>
  </div>
</div>

<div id="s-chat" class="screen">
  <div class="chat-bar">
    <button onclick="hangup()" style="background:none;border:none;color:var(--muted2);font-size:1.4rem;cursor:pointer">✕</button>
    <div style="flex:1">
      <div id="chat-partner-name" style="font-weight:700">Chat</div>
      <div id="chat-partner-code" style="font-size:.75rem;color:var(--muted2)">Code</div>
    </div>
  </div>
  <div id="messages"></div>
  <div class="chat-input-area">
    <textarea id="chat-inp" placeholder="Nachricht..." rows="1" oninput="autoH(this)" onkeydown="hkey(event)"></textarea>
    <button onclick="sendMsg()" style="background:var(--acc);border:none;width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
    </button>
  </div>
</div>

<script>
/* ══ STATE ══ */
let peer = null, conn = null, pendingConn = null;
let myCode = localStorage.getItem('sm_code') || Math.floor(100000 + Math.random() * 899999).toString();
localStorage.setItem('sm_code', myCode);

let myName = localStorage.getItem('sm_name') || 'User_' + myCode.slice(-3);
let partnerCode = '', partnerName = '', chatId = '';

/* ══ INIT ══ */
window.onload = () => {
  document.getElementById('my-code-display').textContent = myCode.slice(0,3) + ' · ' + myCode.slice(3,6);
  initPeer();
  renderPrev();
  renderMissed();
  
  // Digit Input Logic
  const inps = document.querySelectorAll('.dinp');
  inps.forEach((inp, idx) => {
    inp.oninput = (e) => {
      if (inp.value) {
        inp.classList.add('filled');
        if (inps[idx+1]) inps[idx+1].focus();
      }
      checkReady();
    };
    inp.onkeydown = (e) => {
      if (e.key === 'Backspace' && !inp.value && inps[idx-1]) {
        inps[idx-1].focus();
      }
    };
  });
};

function checkReady() {
  const code = Array.from(document.querySelectorAll('.dinp')).map(i => i.value).join('');
  document.getElementById('cbtn').disabled = (code.length !== 6);
}

function initPeer() {
  peer = new Peer('sm-' + myCode);
  
  peer.on('open', () => console.log('Peer Online'));
  
  peer.on('connection', c => {
    if (conn || pendingConn) {
      c.on('open', () => { c.send({t:'system', msg:'Besetzt'}); setTimeout(() => c.close(), 500); });
      return;
    }
    
    pendingConn = c;
    document.getElementById('call-name').textContent = c.metadata?.name || 'Unbekannt';
    document.getElementById('call-code').textContent = c.peer.replace('sm-','');
    showScreen('s-call');
    
    // V20 FIX: Falls der Anrufer abbricht, als verpasst markieren
    c.on('close', () => {
      if (pendingConn === c) {
        addMissed(c.peer.replace('sm-',''), c.metadata?.name);
        closeCall();
      }
    });
  });
  
  peer.on('error', err => {
    if (err.type === 'peer-unavailable') toast('Partner nicht online');
    else toast('Verbindungsfehler');
    console.error(err);
  });
}

/* ══ MISSED CALLS LOGIC (V20) ══ */
function addMissed(code, name) {
  let list = JSON.parse(localStorage.getItem('sm_missed') || '[]');
  // Dubletten-Check: Wenn der letzte Eintrag derselbe Code ist, nur Zeit aktualisieren
  if (list.length > 0 && list[0].code === code) list.shift();
  
  list.unshift({ code, name: name || 'Unbekannt', ts: Date.now() });
  localStorage.setItem('sm_missed', JSON.stringify(list.slice(0, 5)));
  renderMissed();
}

function renderMissed() {
  const list = JSON.parse(localStorage.getItem('sm_missed') || '[]');
  const section = document.querySelector('.missed-section');
  const container = document.getElementById('missed-list');
  
  if (list.length === 0) {
    section.style.display = 'none';
    return;
  }
  
  section.style.display = 'block';
  container.innerHTML = list.map(m => `
    <div class="missed-item" onclick="callBack('${m.code}')">
      <div class="missed-av">${(m.name || '?')[0].toUpperCase()}</div>
      <div class="missed-info">
        <div class="missed-name">${esc(m.name)}</div>
        <div class="missed-time">${new Date(m.ts).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
      </div>
      <div style="color:var(--p3); font-size:1.1rem">📞</div>
    </div>
  `).join('');
}

function clearMissed() {
  localStorage.removeItem('sm_missed');
  renderMissed();
}

function callBack(code) {
  const inps = document.querySelectorAll('.dinp');
  code.split('').forEach((char, i) => {
    if (inps[i]) {
      inps[i].value = char;
      inps[i].classList.add('filled');
    }
  });
  checkReady();
  connectToPeer();
}

/* ══ ACTIONS ══ */
function connectToPeer() {
  const code = Array.from(document.querySelectorAll('.dinp')).map(i => i.value).join('');
  partnerCode = code;
  partnerName = 'Partner';
  
  toast('Verbinde...');
  const c = peer.connect('sm-' + code, { metadata: { name: myName } });
  
  c.on('open', () => {
    chatId = [myCode, partnerCode].sort().join('-');
    openChat(c);
  });
}

function acceptCall() {
  if (!pendingConn) return;
  const c = pendingConn;
  pendingConn = null; // Wichtig: Listener in initPeer greift jetzt nicht mehr für missed calls
  partnerCode = c.peer.replace('sm-','');
  partnerName = c.metadata?.name || 'Partner';
  chatId = [myCode, partnerCode].sort().join('-');
  openChat(c);
}

function declineCall() {
  if (pendingConn) {
    addMissed(pendingConn.peer.replace('sm-',''), pendingConn.metadata?.name);
    pendingConn.close();
  }
  closeCall();
}

function openChat(c) {
  conn = c;
  document.getElementById('chat-partner-name').textContent = partnerName;
  document.getElementById('chat-partner-code').textContent = partnerCode;
  document.getElementById('messages').innerHTML = '';
  
  // Load History
  const history = JSON.parse(localStorage.getItem('sm_chat_' + chatId) || '[]');
  history.forEach(m => appendMsg(m));
  
  c.on('data', data => {
    if (data.t === 'text') {
      const m = { text: data.text, own: false, ts: Date.now() };
      appendMsg(m);
      saveMsg(m);
    }
  });
  
  c.on('close', () => { toast('Verbindung getrennt'); hangup(); });
  
  showScreen('s-chat');
}

function sendMsg() {
  const inp = document.getElementById('chat-inp');
  const txt = inp.value.trim();
  if (!txt || !conn) return;
  
  const m = { text: txt, own: true, ts: Date.now() };
  conn.send({ t: 'text', text: txt });
  appendMsg(m);
  saveMsg(m);
  
  inp.value = '';
  autoH(inp);
}

function hangup() {
  if (conn) conn.close();
  conn = null;
  showScreen('s-home');
  renderPrev();
}

function closeCall() {
  pendingConn = null;
  showScreen('s-home');
}

/* ══ HELPERS ══ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function appendMsg(m) {
  const div = document.createElement('div');
  div.className = 'msg ' + (m.own ? 'own' : 'remote');
  div.textContent = m.text;
  document.getElementById('messages').appendChild(div);
  const wrap = document.getElementById('messages');
  wrap.scrollTop = wrap.scrollHeight;
}

function saveMsg(m) {
  let history = JSON.parse(localStorage.getItem('sm_chat_' + chatId) || '[]');
  history.push(m);
  localStorage.setItem('sm_chat_' + chatId, JSON.stringify(history.slice(-50)));
  
  // Update Preview Index
  let prev = JSON.parse(localStorage.getItem('sm_prev') || '[]');
  prev = prev.filter(p => p.id !== chatId);
  prev.unshift({ id: chatId, name: partnerName, code: partnerCode, last: m.text, ts: Date.now() });
  localStorage.setItem('sm_prev', JSON.stringify(prev.slice(0,10)));
}

function renderPrev() {
  const list = JSON.parse(localStorage.getItem('sm_prev') || '[]');
  const container = document.getElementById('prev-list');
  container.innerHTML = list.map(p => `
    <div class="prev-item" onclick="callBack('${p.code}')" style="display:flex; align-items:center; gap:.8rem; padding:.85rem; border-radius:14px; margin-bottom:.5rem; background:var(--card)">
      <div style="width:40px; height:40px; border-radius:50%; background:linear-gradient(135deg,var(--p2),var(--p3)); display:flex; align-items:center; justify-content:center">${p.name[0]}</div>
      <div style="flex:1">
        <div style="font-weight:600">${esc(p.name)}</div>
        <div style="font-size:.8rem; color:var(--muted2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis">${esc(p.last)}</div>
      </div>
    </div>
  `).join('');
}

function copyCode() {
  navigator.clipboard.writeText(myCode);
  toast('✅ Code kopiert');
}

function shareCode() {
  const text = `SpotMe Code: ${myCode}`;
  if (navigator.share) navigator.share({ title: 'SpotMe', text });
  else copyCode();
}

function toast(m) {
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = m;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

function autoH(el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }
function hkey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); } }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
</script>

</body>
</html>
