<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>SpotMe · Chat V14</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#080c10">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.4/peerjs.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:    #080c10;
  --sur:   #0f1520;
  --card:  #131c2b;
  --bord:  rgba(255,255,255,.07);
  --acc:   #00e5c0;
  --p2:    #7b5cfa;
  --p3:    #ff4f7b;
  --text:  #e8edf5;
  --muted: #5a6a80;
  --green: #22d46e;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent }
html, body { height:100%; overflow:hidden; font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); overscroll-behavior-y: contain; }

.screen { display:none; position:fixed; inset:0; flex-direction:column; background:var(--bg) }
.screen.active { display:flex; animation:sIn .25s ease }
@keyframes sIn { from{opacity:0;transform:translateX(14px)} to{opacity:1;transform:none} }
.inner { flex:1; overflow-y:auto; padding:1.5rem 1.25rem 5rem; max-width:480px; width:100%; margin:0 auto }
.center-content { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; text-align:center; padding:2rem; }

/* BRAND & STATUS */
.brand { display:flex; align-items:center; gap:.5rem; margin-bottom:2rem }
.bdot { width:8px; height:8px; border-radius:50%; background:var(--acc); box-shadow:0 0 12px var(--acc); animation:blink 2s ease infinite }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
.bname { font-family:'Syne',sans-serif; font-weight:800; font-size:1.25rem; color:var(--acc); letter-spacing:-.02em }
.spill { display:inline-flex; align-items:center; gap:.5rem; padding:.4rem 1rem; border-radius:100px; font-size:.8rem; margin-bottom:1.5rem; background:rgba(123,92,250,0.1); border:1px solid rgba(123,92,250,0.2); color:#7b5cfa; }

/* CHAT BAR */
.chat-bar { display:flex; align-items:center; justify-content:space-between; padding:0.7rem 1rem; border-bottom:1px solid var(--bord); background:rgba(8,12,16,.96); backdrop-filter:blur(25px); flex-shrink:0; position:relative; z-index:100; height:70px; }
.peer-wrap { display:flex; align-items:center; gap:.75rem; flex:1; min-width:0; }
.back-btn { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; color: var(--muted); cursor: pointer; transition: all .2s; }
.pav { width:40px; height:40px; border-radius:50%; background:linear-gradient(135deg,var(--p2),var(--p3)); display:flex; align-items:center; justify-content:center; font-size:1rem; position:relative; }
.pav::after { content:''; position:absolute; bottom:2px; right:2px; width:10px; height:10px; border-radius:50%; background:var(--green); border:2px solid var(--bg) }
.pname { font-weight:600; font-size:0.95rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ibtn { width:46px; height:46px; border-radius:14px; border:1px solid rgba(255,255,255,0.12); background:rgba(255,255,255,0.04); color:var(--text); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:1.2rem; }

/* MENU */
.drop { position:absolute; top:75px; right:1rem; background:var(--card); border:1px solid var(--bord); border-radius:14px; padding:.5rem; display:none; flex-direction:column; gap:.2rem; box-shadow:0 15px 35px rgba(0,0,0,0.7); min-width:220px; z-index:110; }
.drop.show { display:flex; }
.mitem { display:flex; align-items:center; gap:.8rem; padding:.8rem; border-radius:10px; background:transparent; border:none; color:var(--text); text-align:left; cursor:pointer; font-size: 0.9rem; }
.mitem:hover { background:rgba(255,255,255,0.06); }
.mitem.mr { color:var(--p3) }

/* MESSAGES */
.messages { flex:1; overflow-y:auto; padding:1rem; display:flex; flex-direction:column; gap:.4rem; max-width:480px; width:100%; margin:0 auto }
.msg { display:flex; flex-direction:column; max-width:82%; animation:msgIn .2s ease }
@keyframes msgIn { from{opacity:0;transform:translateY(6px) scale(.98)} to{opacity:1;transform:none} }
.msg-o { align-self:flex-end; align-items:flex-end }
.msg-i { align-self:flex-start; align-items:flex-start }
.bubble { padding:.6rem .9rem; border-radius:18px }
.msg-o .bubble { background:var(--acc); color:var(--bg); border-radius:18px 4px 18px 18px }
.msg-i .bubble { background:var(--sur); border:1px solid var(--bord); border-radius:4px 18px 18px 18px }
.btime { font-size:.62rem; margin-top:.25rem; opacity:.6 }

/* INPUT & UPLOAD */
.icont { position:relative; display:flex; flex-direction:column; width:100%; max-width:480px; margin:0 auto; flex-shrink:0 }
.ibar { padding:.7rem 1rem; border-top:1px solid var(--bord); background:rgba(8,12,16,.9); backdrop-filter:blur(20px); display:flex; align-items:flex-end; gap:.5rem }
.minp { flex:1; background:var(--sur); border:1px solid var(--bord); border-radius:14px; padding:.65rem 1rem; color:var(--text); font-family:inherit; font-size:0.95rem; outline:none; resize:none; max-height:120px; }
.sbtn { width:42px; height:42px; border-radius:12px; background:var(--acc); color:var(--bg); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:1rem; }
.sbtn:disabled { opacity: 0.3; }

.upbar-wrap { height:3px; background:rgba(255,255,255,.1); width:100%; position:absolute; top:0; left:0; opacity:0; transition:opacity .3s }
.upbar { height:100%; background:var(--acc); width:0%; transition:width .1s linear }

/* CODE CARD & DIGITS */
.code-card { background:linear-gradient(135deg,rgba(0,229,192,.08),rgba(123,92,250,.08)); border:1px solid rgba(0,229,192,.2); border-radius:20px; padding:1.4rem; text-align:center; margin-bottom:1.5rem; }
.code-digits { font-family:'Syne',sans-serif; font-weight:800; font-size:2.8rem; letter-spacing:.05em; color:var(--acc); margin-bottom:.8rem; }
.drow { display:flex; gap:.5rem; justify-content:center; margin-bottom:.9rem }
.dinp { width:44px; height:54px; border-radius:10px; border:1.5px solid var(--bord); background:var(--sur); color:var(--text); font-family:'Syne',sans-serif; font-size:1.5rem; font-weight:700; text-align:center; outline:none; }
.dinp.filled { border-color:var(--acc); color:var(--acc) }

.toast { position:fixed; bottom:2rem; left:50%; transform:translateX(-50%) translateY(80px); background:var(--sur); border:1px solid var(--bord); border-radius:100px; padding:.65rem 1.3rem; font-size:.85rem; z-index:9999; transition:all .3s; opacity:0; white-space:nowrap }
.toast.show { transform:translateX(-50%) translateY(0); opacity:1 }
</style>
</head>
<body>

<div id="s-home" class="screen active">
  <div class="inner">
    <div class="brand"><div class="bdot"></div><span class="bname">Spot<b>Me</b></span></div>
    <h1>Privat &amp;<br>Direkt.</h1>
    <p class="sub">Version 14 · Sicherer P2P Chat<br>Ende-zu-Ende Dateiübertragung.</p>

    <div id="spill" class="spill connecting">
      <span id="spill-txt">Verbinde...</span>
    </div>

    <div class="code-card" id="mycode-area">
      <div class="code-digits" id="mycode">------</div>
      <div style="display:flex; gap:.5rem; justify-content:center">
        <button onclick="copyCode()" style="background:rgba(255,255,255,0.05); border:1px solid var(--bord); color:var(--muted); padding:.4rem .8rem; border-radius:100px; font-size:.75rem;">📋 Kopieren</button>
        <button onclick="shareCode()" style="background:rgba(255,255,255,0.05); border:1px solid var(--bord); color:var(--muted); padding:.4rem .8rem; border-radius:100px; font-size:.75rem;">↗️ Teilen</button>
      </div>
    </div>

    <div class="center-content" id="offline-area" style="display:none; height:auto; margin-bottom:2rem;">
      <p class="sub">Du bist derzeit offline.</p>
      <button onclick="location.reload()" style="background:var(--acc); color:var(--bg); border:none; padding:.8rem 1.5rem; border-radius:12px; font-weight:700;">Wieder Online gehen</button>
    </div>

    <div class="center-content" style="background:var(--card); border:1px solid var(--bord); border-radius:16px; padding:1.2rem;">
      <div class="drow">
        <input class="dinp" maxlength="1" inputmode="numeric">
        <input class="dinp" maxlength="1" inputmode="numeric">
        <input class="dinp" maxlength="1" inputmode="numeric">
        <input class="dinp" maxlength="1" inputmode="numeric">
        <input class="dinp" maxlength="1" inputmode="numeric">
        <input class="dinp" maxlength="1" inputmode="numeric">
      </div>
      <button class="sbtn" id="cbtn" onclick="connectToPeer()" disabled style="width:100%; height:50px; font-weight:700; background:var(--acc); color:var(--bg);">💬 Chat starten</button>
    </div>

    <div id="psec" style="display:none; margin-top:2rem">
      <div style="font-size:.7rem; text-transform:uppercase; color:var(--muted); margin-bottom:.8rem;">Letzte Chats</div>
      <div id="plist" style="display:flex; flex-direction:column; gap:.5rem"></div>
    </div>
  </div>
</div>

<div id="s-in" class="screen">
  <div class="center-content">
    <div class="pulse-av">🧑</div>
    <h1 id="in-name" style="color:var(--acc);">Anfrage...</h1>
    <p class="sub" id="in-code">Code: ---</p>
    <div style="display:flex; gap:1rem; margin-top:2rem; width:100%; max-width:300px">
      <button onclick="declineCall()" style="flex:1; padding:1rem; border-radius:12px; background:rgba(255,79,123,0.1); border:1px solid var(--p3); color:var(--p3);">Ablehnen</button>
      <button onclick="acceptCall()" style="flex:1; padding:1rem; border-radius:12px; background:var(--acc); border:none; color:var(--bg); font-weight:700;">Annehmen</button>
    </div>
  </div>
</div>

<div id="s-chat" class="screen">
  <div class="chat-bar">
    <div class="peer-wrap">
      <div class="back-btn" onclick="goHome()">‹</div>
      <div class="pav" id="pav">🧑</div>
      <div>
        <div class="pname" id="pname">Partner</div>
        <div class="pstatus" id="pstatus" style="font-size:.7rem; color:var(--green)">● Online</div>
      </div>
    </div>
    <div class="bar-btns">
      <button class="ibtn" onclick="toggleDrop()">⋮</button>
    </div>
    <div class="drop" id="drop">
      <button class="mitem" onclick="exportChat()">💾 <div class="mlab"><div>Exportieren</div><div class="mdesc">Chat sichern</div></div></button>
      <button class="mitem" onclick="document.getElementById('fimp').click()">📂 <div class="mlab"><div>Importieren</div><div class="mdesc">Backup laden</div></div></button>
      <div style="height:1px; background:var(--bord); margin:2px 0;"></div>
      <button class="mitem" onclick="goOffline()">🚫 <div class="mlab"><div>Offline gehen</div><div class="mdesc">Verbindung trennen</div></div></button>
      <button class="mitem mr" onclick="clearChat()">🗑️ <div class="mlab"><div>Verlauf löschen</div><div class="mdesc">Lokal entfernen</div></div></button>
    </div>
    <input type="file" id="fimp" accept=".json" style="display:none" onchange="importChat(this)">
  </div>

  <div class="messages" id="messages"></div>

  <div class="icont">
    <div class="upbar-wrap" id="upw"><div class="upbar" id="upb"></div></div>
    <div class="ibar">
      <button class="actbtn" onclick="document.getElementById('finp').click()" style="width:42px; height:42px; border-radius:12px; background:var(--sur); border:1px solid var(--bord); color:var(--muted);">📎</button>
      <input type="file" id="finp" style="display:none" onchange="sendFile(this)">
      <textarea class="minp" id="minp" placeholder="Nachricht..." rows="1" oninput="autoH(this)"></textarea>
      <button class="sbtn" id="sbtn" onclick="sendMsg()" disabled>➤</button>
    </div>
  </div>
</div>

<script>
'use strict';

let peer = null, conn = null, pendingConn = null;
let myCode = localStorage.getItem('sm_code') || Math.random().toString().substring(2,8);
let myName = localStorage.getItem('sm_name') || 'User_'+myCode.slice(0,3);
let partnerCode = '', partnerName = '', chatId = '';
const CHUNK = 16384; 
let fileBufs = {};

localStorage.setItem('sm_code', myCode);
localStorage.setItem('sm_name', myName);

window.onload = () => {
  document.getElementById('mycode').textContent = myCode.slice(0,3) + '-' + myCode.slice(3,6);
  initDigits();
  renderPrev();
  initPeer();
};

function initPeer() {
  if(peer) return;
  peer = new Peer(myCode);
  peer.on('open', (id) => {
    const s = document.getElementById('spill');
    if(s) {
      s.style.color = 'var(--green)'; s.style.background = 'rgba(34,212,110,0.1)';
      document.getElementById('spill-txt').textContent = 'Online';
    }
  });
  peer.on('connection', c => {
    if(conn && conn.open) { c.close(); return; }
    pendingConn = c;
    document.getElementById('in-name').textContent = c.metadata?.name || 'Jemand';
    document.getElementById('in-code').textContent = 'Code: ' + c.peer;
    c.on('open', () => { c._ff = true; if(conn === c) startChat(c); });
    showScreen('s-in');
  });
  peer.on('error', e => {
    if(e.type === 'peer-unavailable') toast('Partner nicht gefunden');
    console.error(e);
  });
}

function connectToPeer() {
  const code = [...document.querySelectorAll('.dinp')].map(i=>i.value).join('');
  if(code.length!==6) return;
  partnerCode = code;
  const c = peer.connect(code, {metadata:{name:myName}});
  startChat(c);
}

function acceptCall() { if(pendingConn) startChat(pendingConn); pendingConn = null; }
function declineCall() { if(pendingConn) pendingConn.close(); pendingConn = null; showScreen('s-home'); }

function startChat(c) {
  conn = c; partnerCode = c.peer; partnerName = c.metadata?.name || 'Partner';
  chatId = 'sm_'+[myCode, partnerCode].sort().join('_');
  showScreen('s-chat');
  document.getElementById('pname').textContent = partnerName;
  document.getElementById('messages').innerHTML = '';
  loadHistory();

  const ready = () => { document.getElementById('sbtn').disabled = false; toast('Verbunden!'); };
  if(c.open || c._ff) ready(); else c.on('open', ready);
  
  c.on('data', d => handleData(d));
  c.on('close', () => { 
    toast('Partner hat den Chat verlassen'); 
    document.getElementById('sbtn').disabled = true;
    document.getElementById('pstatus').textContent = '○ Offline';
    document.getElementById('pstatus').style.color = 'var(--muted)';
  });
}

function sendMsg() {
  const i = document.getElementById('minp'); if(!i.value.trim() || !conn) return;
  const m = {t:'text', text:i.value, ts:Date.now()};
  conn.send(m); appendMsg({...m, own:true}); persistMsg({...m, own:true});
  i.value = ''; i.style.height = 'auto';
}

/* ══ DATEI UPLOAD LOGIK (Chunking) ══ */
async function sendFile(inp) {
  const f = inp.files[0]; if(!f || !conn || !conn.open) return;
  if(f.size > 100*1024*1024) { toast('⚠️ Max 100MB erlaubt'); return; }

  const fid = Math.random().toString(36).substr(2,9);
  const tChunks = Math.ceil(f.size/CHUNK);
  conn.send({t:'f-start', id:fid, name:f.name, type:f.type, chunks:tChunks, size:f.size});
  
  document.getElementById('upw').style.opacity = '1';
  const rd = new FileReader(); let off=0, idx=0;
  
  rd.onload = e => {
    conn.send({t:'f-chunk', id:fid, idx, data:e.target.result});
    off += CHUNK; idx++;
    document.getElementById('upb').style.width = Math.floor((idx/tChunks)*100) + '%';
    if(off < f.size) rd.readAsArrayBuffer(f.slice(off, off+CHUNK));
    else {
      conn.send({t:'f-end', id:fid});
      setTimeout(() => { document.getElementById('upw').style.opacity = '0'; document.getElementById('upb').style.width = '0'; }, 500);
      fileToB64(f).then(b64 => {
        const m = {t:'file', url:b64, name:f.name, ts:Date.now(), own:true};
        appendMsg(m); persistMsg(m);
      });
    }
  };
  rd.readAsArrayBuffer(f.slice(0, CHUNK));
  inp.value = '';
}

function fileToB64(f) { return new Promise(r => { const rd=new FileReader(); rd.onload=()=>r(rd.result); rd.readAsDataURL(f); }); }

function handleData(d) {
  if(d.t === 'text') { appendMsg({...d, own:false}); persistMsg({...d, own:false}); }
  else if(d.t === 'f-start') { fileBufs[d.id] = {meta:d, chunks:[]}; }
  else if(d.t === 'f-chunk') { if(fileBufs[d.id]) fileBufs[d.id].chunks.push(d.data); }
  else if(d.t === 'f-end') {
    const b = fileBufs[d.id]; if(!b) return;
    const blob = new Blob(b.chunks, {type:b.meta.type});
    const url = URL.createObjectURL(blob);
    const m = {t:'file', url, name:b.meta.name, ts:Date.now(), own:false};
    appendMsg(m); persistMsg(m);
    delete fileBufs[d.id];
  }
}

function appendMsg(m) {
  const l = document.getElementById('messages');
  const w = document.createElement('div');
  w.className = `msg ${m.own?'msg-o':'msg-i'}`;
  let content = m.t==='text' ? esc(m.text) : `<a href="${m.url}" download="${m.name}" style="color:inherit; font-weight:700;">📎 ${m.name}</a>`;
  w.innerHTML = `<div class="bubble"><div>${content}</div><div class="btime">${new Date(m.ts).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div></div>`;
  l.appendChild(w); l.scrollTop = l.scrollHeight;
}

function goOffline() {
  if(confirm('Möchtest du die Verbindung zum Server wirklich trennen? Du bist dann offline.')) {
    if(conn) conn.close();
    if(peer) peer.destroy();
    document.getElementById('mycode-area').style.display = 'none';
    document.getElementById('offline-area').style.display = 'block';
    const s = document.getElementById('spill');
    s.style.color = 'var(--p3)'; s.style.background = 'rgba(255,79,123,0.1)';
    document.getElementById('spill-txt').textContent = 'Offline';
    closeDrop();
    showScreen('s-home');
  }
}

function persistMsg(m) {
  const k = 'smmsg_'+chatId;
  const a = JSON.parse(localStorage.getItem(k)||'[]'); a.push(m);
  localStorage.setItem(k, JSON.stringify(a.slice(-100)));
  updateIdx(m.text || '📎 Datei');
}

function loadHistory() {
  const a = JSON.parse(localStorage.getItem('smmsg_'+chatId)||'[]');
  a.forEach(m => appendMsg(m));
}

function updateIdx(p) {
  const k = 'sm_idx', a = JSON.parse(localStorage.getItem(k)||'[]');
  const i = a.findIndex(x=>x.id===chatId);
  const e = {id:chatId, partner:partnerName, code:partnerCode, ts:Date.now(), prev:p};
  if(i>=0) a[i]=e; else a.unshift(e);
  localStorage.setItem(k, JSON.stringify(a.slice(0,10)));
}

function renderPrev() {
  const a = JSON.parse(localStorage.getItem('sm_idx')||'[]');
  if(!a.length) return;
  document.getElementById('psec').style.display = 'block';
  document.getElementById('plist').innerHTML = a.map(c => `
    <div onclick="reconnect('${c.code}','${c.partner}')" style="background:var(--sur); padding:.8rem; border-radius:12px; border:1px solid var(--bord); cursor:pointer">
      <div style="font-weight:600; font-size:.85rem">${c.partner}</div>
      <div style="font-size:.7rem; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis">${c.prev}</div>
    </div>
  `).join('');
}

function reconnect(code, name) { partnerCode=code; partnerName=name; connectToPeer(); }

function initDigits() {
  const inps = document.querySelectorAll('.dinp');
  inps.forEach((p,i) => {
    p.oninput = () => { 
      p.classList.toggle('filled', !!p.value);
      if(p.value && i<5) inps[i+1].focus(); 
      document.getElementById('cbtn').disabled = [...inps].some(x=>!x.value); 
    };
    p.onkeydown = e => { if(e.key==='Backspace' && !p.value && i>0) inps[i-1].focus(); };
  });
}

function exportChat() {
  const a = JSON.parse(localStorage.getItem('smmsg_'+chatId)||'[]');
  const b = new Blob([JSON.stringify(a)], {type:'application/json'});
  const u = URL.createObjectURL(b);
  const l = document.createElement('a'); l.href=u; l.download=`chat_${partnerName}.json`; l.click();
  toggleDrop();
}

function importChat(inp) {
  const f = inp.files[0]; if(!f) return;
  const rd = new FileReader();
  rd.onload = e => {
    try {
      JSON.parse(e.target.result);
      localStorage.setItem('smmsg_'+chatId, e.target.result);
      document.getElementById('messages').innerHTML = ''; loadHistory();
      toast('Chat importiert');
    } catch(err) { toast('Ungültige Datei'); }
  };
  rd.readAsText(f); toggleDrop();
}

function clearChat() { if(confirm('Löschen?')) { localStorage.removeItem('smmsg_'+chatId); goHome(); } }
function showScreen(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function toggleDrop() { document.getElementById('drop').classList.toggle('show'); }
function closeDrop() { document.getElementById('drop').classList.remove('show'); }

function goHome() { 
  if(conn) { try { conn.removeAllListeners(); conn.close(); } catch(e){} conn = null; }
  closeDrop(); showScreen('s-home'); renderPrev(); 
}

function toast(m) {
  const t = document.createElement('div'); t.className='toast'; t.textContent=m; document.body.appendChild(t);
  setTimeout(()=>t.classList.add('show'),10); setTimeout(()=>{ t.classList.remove('show'); setTimeout(()=>t.remove(),300); }, 2500);
}
function copyCode() { navigator.clipboard.writeText(myCode); toast('Code kopiert!'); }
function shareCode() { if(navigator.share) navigator.share({title:'SpotMe', text:myCode}); }
function autoH(e) { e.style.height='auto'; e.style.height=e.scrollHeight+'px'; }
function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

window.addEventListener('click', e => { 
  if(!e.target.closest('.bar-btns') && !e.target.closest('.drop')) closeDrop();
});
</script>
