<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SpotMe · Chat</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.4/peerjs.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════
   VARIABLES & RESET
══════════════════════════════════ */
:root {
  --bg:     #080c10;
  --sur:    #0f1520;
  --card:   #131c2b;
  --bord:   rgba(255,255,255,.07);
  --acc:    #00e5c0;
  --p2:     #7b5cfa;
  --p3:     #ff4f7b;
  --text:   #e8edf5;
  --muted:  #5a6a80;
  --green:  #22d46e;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent }
html, body { height:100%; overflow:hidden; font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text) }

/* ══════════════════════════════════
   SCREENS
══════════════════════════════════ */
.screen { display:none; position:fixed; inset:0; flex-direction:column; background:var(--bg) }
.screen.active { display:flex; animation:sIn .25s ease }
@keyframes sIn { from{opacity:0;transform:translateX(14px)} to{opacity:1;transform:none} }
.inner { flex:1; overflow-y:auto; padding:1.5rem 1.25rem 5rem; max-width:480px; width:100%; margin:0 auto }

/* ══════════════════════════════════
   BRAND
══════════════════════════════════ */
.brand { display:flex; align-items:center; gap:.5rem; margin-bottom:2rem }
.bdot { width:8px; height:8px; border-radius:50%; background:var(--acc); box-shadow:0 0 12px var(--acc); animation:blink 2s ease infinite }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
.bname { font-family:'Syne',sans-serif; font-weight:800; font-size:1.25rem; color:var(--acc); letter-spacing:-.02em }
.bname b { color:var(--text) }

/* ══════════════════════════════════
   TYPOGRAPHY
══════════════════════════════════ */
h1 { font-family:'Syne',sans-serif; font-weight:800; font-size:2.1rem; letter-spacing:-.03em; line-height:1.1; margin-bottom:.4rem }
h2 { font-family:'Syne',sans-serif; font-weight:700; font-size:1.45rem; letter-spacing:-.02em; margin-bottom:.4rem }
.sub { color:var(--muted); font-size:.87rem; font-weight:300; line-height:1.65; margin-bottom:1.5rem }

/* ══════════════════════════════════
   STATUS PILL
══════════════════════════════════ */
.spill { display:inline-flex; align-items:center; gap:.45rem; padding:.35rem .9rem; border-radius:100px; font-size:.77rem; font-weight:500; margin-bottom:1.5rem }
.spill.connecting { background:rgba(123,92,250,.1); border:1px solid rgba(123,92,250,.25); color:var(--p2) }
.spill.online     { background:rgba(34,212,110,.1);  border:1px solid rgba(34,212,110,.25); color:var(--green) }
.spill.offline    { background:rgba(255,79,123,.08); border:1px solid rgba(255,79,123,.2);  color:var(--p3) }
.sdot { width:6px; height:6px; border-radius:50%; background:currentColor }
.sdot.spin { animation:blink .8s ease infinite }

/* ══════════════════════════════════
   CODE CARD
══════════════════════════════════ */
.code-card {
  background:linear-gradient(135deg,rgba(0,229,192,.08),rgba(123,92,250,.08));
  border:1px solid rgba(0,229,192,.2); border-radius:20px;
  padding:1.4rem; text-align:center; margin-bottom:1.5rem;
}
.code-label { font-size:.7rem; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:.7rem }
.code-digits {
  font-family:'Syne',sans-serif; font-weight:800; font-size:2.8rem;
  letter-spacing:.05em; color:var(--acc); text-shadow:0 0 40px rgba(0,229,192,.25); margin-bottom:.8rem;
}
.code-share { display:flex; gap:.5rem; justify-content:center }
.csbtn {
  display:flex; align-items:center; gap:.4rem; padding:.38rem .85rem;
  border-radius:100px; border:1px solid var(--bord); background:rgba(255,255,255,.04);
  color:var(--muted); font-family:'DM Sans',sans-serif; font-size:.74rem; cursor:pointer; transition:all .2s
}
.csbtn:hover { color:var(--text); border-color:rgba(255,255,255,.18) }

/* ══════════════════════════════════
   CONNECT BOX & DIGITS
══════════════════════════════════ */
.conn-box { background:var(--card); border:1px solid var(--bord); border-radius:16px; padding:1.2rem; margin-bottom:1.25rem }
.conn-title { font-size:.77rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.07em; margin-bottom:.9rem }
.drow { display:flex; gap:.5rem; justify-content:center; margin-bottom:.9rem }
.dinp {
  width:44px; height:54px; border-radius:10px; border:1.5px solid var(--bord);
  background:var(--sur); color:var(--text); font-family:'Syne',sans-serif; font-size:1.5rem; font-weight:700;
  text-align:center; outline:none; transition:border-color .2s, box-shadow .2s; caret-color:var(--acc)
}
.dinp:focus  { border-color:var(--acc); box-shadow:0 0 0 3px rgba(0,229,192,.12) }
.dinp.filled { border-color:rgba(0,229,192,.35); color:var(--acc) }

/* ══════════════════════════════════
   BUTTONS
══════════════════════════════════ */
.btn { display:flex; align-items:center; justify-content:center; gap:.55rem; padding:.85rem 1.25rem; border-radius:12px; border:none; font-family:'DM Sans',sans-serif; font-size:.9rem; font-weight:500; cursor:pointer; transition:all .2s; width:100% }
.btn-p { background:var(--acc); color:var(--bg); font-weight:600 }
.btn-p:hover  { box-shadow:0 0 24px rgba(0,229,192,.35) }
.btn-p:active { transform:scale(.97) }
.btn-p:disabled { opacity:.4; cursor:not-allowed; transform:none; box-shadow:none }
.btn-o { background:transparent; color:var(--text); border:1px solid var(--bord) }
.btn-o:hover { border-color:rgba(255,255,255,.22) }
.btn-d { background:rgba(255,79,123,.08); color:var(--p3); border:1px solid rgba(255,79,123,.2) }
.btn-row { display:grid; grid-template-columns:1fr 1fr; gap:.75rem; margin-top:.75rem }

/* ══════════════════════════════════
   PREV CHATS
══════════════════════════════════ */
.slabel { font-size:.71rem; font-weight:600; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin-bottom:.7rem }
.chat-item { display:flex; align-items:center; gap:.75rem; padding:.75rem; border-radius:12px; cursor:pointer; transition:background .2s; border:1px solid transparent }
.chat-item:hover { background:var(--sur); border-color:var(--bord) }
.cav { width:40px; height:40px; border-radius:50%; background:linear-gradient(135deg,var(--p2),var(--p3)); display:flex; align-items:center; justify-content:center; font-size:1rem; flex-shrink:0 }
.cinfo { flex:1; min-width:0 }
.cname { font-size:.88rem; font-weight:500 }
.cprev { font-size:.73rem; color:var(--muted); margin-top:.12rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis }
.cmeta { text-align:right; flex-shrink:0 }
.ctime { font-size:.68rem; color:var(--muted) }
.ctag  { font-size:.65rem; font-weight:600; padding:.12rem .4rem; border-radius:100px; background:rgba(0,229,192,.08); color:var(--acc); border:1px solid rgba(0,229,192,.15); display:inline-block; margin-top:.15rem }

/* ══════════════════════════════════
   INCOMING CALL SCREEN
══════════════════════════════════ */
.incoming-wrap {
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:2rem; gap:1.5rem; text-align:center;
}
.caller-avatar {
  width:90px; height:90px; border-radius:50%;
  background:linear-gradient(135deg,var(--p2),var(--p3));
  display:flex; align-items:center; justify-content:center; font-size:2.5rem;
  box-shadow:0 0 0 8px rgba(123,92,250,.15), 0 0 0 16px rgba(123,92,250,.07);
  animation:pulse 2s ease infinite;
}
@keyframes pulse { 0%,100%{box-shadow:0 0 0 8px rgba(123,92,250,.15),0 0 0 16px rgba(123,92,250,.07)} 50%{box-shadow:0 0 0 12px rgba(123,92,250,.1),0 0 0 22px rgba(123,92,250,.04)} }
.caller-name { font-family:'Syne',sans-serif; font-weight:800; font-size:1.8rem; letter-spacing:-.02em }
.caller-code { font-size:.85rem; color:var(--muted); margin-top:.25rem }
.caller-label { font-size:.9rem; color:var(--muted) }
.call-btns { display:grid; grid-template-columns:1fr 1fr; gap:1rem; width:100%; max-width:300px }
.call-btn {
  padding:1rem; border-radius:50px; border:none; font-family:'DM Sans',sans-serif;
  font-size:.9rem; font-weight:600; cursor:pointer; display:flex; align-items:center;
  justify-content:center; gap:.5rem; transition:all .2s
}
.call-accept { background:var(--green); color:#fff }
.call-accept:hover { box-shadow:0 0 24px rgba(34,212,110,.4) }
.call-decline { background:var(--p3); color:#fff }
.call-decline:hover { box-shadow:0 0 24px rgba(255,79,123,.4) }

/* ══════════════════════════════════
   CHAT SCREEN
══════════════════════════════════ */
#s-chat { overflow:hidden }
.chat-bar {
  display:flex; align-items:center; justify-content:space-between;
  padding:.8rem 1.1rem; border-bottom:1px solid var(--bord);
  background:rgba(8,12,16,.95); backdrop-filter:blur(20px); flex-shrink:0; position:relative; z-index:10
}
.peer-wrap { display:flex; align-items:center; gap:.65rem }
.pav {
  width:36px; height:36px; border-radius:50%;
  background:linear-gradient(135deg,var(--p2),var(--p3));
  display:flex; align-items:center; justify-content:center; font-size:.9rem;
  position:relative; transition:opacity .3s
}
.pav::after { content:''; position:absolute; bottom:1px; right:1px; width:9px; height:9px; border-radius:50%; background:var(--green); border:2px solid var(--bg); transition:background .3s }
.pav.off { opacity:.55 }
.pav.off::after { background:var(--muted) }
.pname { font-weight:600; font-size:.88rem }
.pstatus { font-size:.7rem; color:var(--green); margin-top:.1rem; transition:color .3s }
.pstatus.dim { color:var(--muted) }

.bar-btns { display:flex; gap:.3rem }
.ibtn { width:32px; height:32px; border-radius:9px; border:1px solid var(--bord); background:transparent; color:var(--muted); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:.85rem; transition:all .2s }
.ibtn:hover { color:var(--text); background:var(--sur) }

/* dropdown menu */
.drop {
  position:absolute; top:calc(100% + 4px); right:1rem;
  background:var(--card); border:1px solid var(--bord); border-radius:14px;
  padding:.5rem; display:none; flex-direction:column; gap:.15rem;
  box-shadow:0 12px 40px rgba(0,0,0,.5); min-width:210px; z-index:20
}
.drop.show { display:flex; animation:sIn .18s ease }
.mitem {
  display:flex; align-items:center; gap:.75rem; padding:.7rem .85rem; border-radius:9px;
  background:transparent; border:none; color:var(--text); font-family:'DM Sans',sans-serif;
  font-size:.87rem; text-align:left; cursor:pointer; transition:background .15s; width:100%
}
.mitem:hover { background:rgba(255,255,255,.05) }
.mitem.red { color:var(--p3) }
.mico { font-size:1rem; flex-shrink:0 }
.mlab { flex:1 }
.mdsc { font-size:.68rem; color:var(--muted); margin-top:.1rem }
.msep { height:1px; background:var(--bord); margin:.25rem 0 }

/* reconnect bar */
.rcbar { display:none; align-items:center; justify-content:space-between; gap:.7rem; padding:.5rem 1.1rem; background:rgba(255,79,123,.07); border-bottom:1px solid rgba(255,79,123,.15); font-size:.79rem; color:var(--p3); flex-shrink:0 }
.rcbar.show { display:flex }
.rcbtn { padding:.28rem .7rem; border-radius:8px; border:1px solid rgba(255,79,123,.3); background:rgba(255,79,123,.1); color:var(--p3); font-size:.74rem; cursor:pointer; font-family:'DM Sans',sans-serif; transition:background .2s }
.rcbtn:hover { background:rgba(255,79,123,.2) }

/* messages */
.messages { flex:1; overflow-y:auto; padding:.9rem; display:flex; flex-direction:column; gap:.4rem; max-width:480px; width:100%; margin:0 auto }
.messages::-webkit-scrollbar { width:3px }
.messages::-webkit-scrollbar-thumb { background:var(--bord); border-radius:3px }
.dsep { text-align:center; font-size:.67rem; color:var(--muted); padding:.5rem 0; position:relative }
.dsep::before,.dsep::after { content:''; position:absolute; top:50%; width:22%; height:1px; background:var(--bord) }
.dsep::before { left:0 } .dsep::after { right:0 }
.msg { display:flex; flex-direction:column; max-width:78%; animation:mIn .2s ease }
@keyframes mIn { from{opacity:0;transform:translateY(5px) scale(.97)} to{opacity:1;transform:none} }
.msg-o { align-self:flex-end; align-items:flex-end }
.msg-i { align-self:flex-start; align-items:flex-start }
.bbl { padding:.6rem .9rem; border-radius:18px }
.msg-o .bbl { background:var(--acc); color:var(--bg); border-radius:18px 4px 18px 18px; font-weight:500 }
.msg-i .bbl { background:var(--sur); border:1px solid var(--bord); border-radius:4px 18px 18px 18px }
.btxt { font-size:.87rem; line-height:1.5; word-break:break-word; white-space:pre-wrap }
.btime { font-size:.62rem; margin-top:.25rem; opacity:.6 }
.msg-o .btime { text-align:right }

/* image & file bubbles */
.imgbbl { max-width:220px; border-radius:14px; overflow:hidden; cursor:pointer; margin-bottom:2px }
.imgbbl img { width:100%; display:block; border-radius:14px }
.filbbl { display:flex; align-items:center; gap:.6rem; padding:.65rem .85rem; border-radius:14px; background:rgba(255,255,255,.05); border:1px solid var(--bord); cursor:pointer; transition:background .2s; max-width:240px; text-decoration:none; margin-bottom:2px }
.filbbl:hover { background:rgba(255,255,255,.09) }
.fico { font-size:1.3rem; flex-shrink:0 }
.fmeta { min-width:0 }
.fname { font-size:.8rem; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:var(--text) }
.fsize { font-size:.68rem; color:var(--muted); margin-top:.1rem }

.empty { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:.4rem; color:var(--muted); text-align:center; padding:2rem }
.eico { font-size:2.5rem; margin-bottom:.5rem; opacity:.35 }

/* input bar */
.input-wrap { position:relative; display:flex; flex-direction:column; width:100%; max-width:480px; margin:0 auto; flex-shrink:0 }
.upbar { height:3px; background:rgba(255,255,255,.07); width:100%; opacity:0; transition:opacity .3s }
.upfill { height:100%; background:var(--acc); width:0%; transition:width .12s linear }
.input-bar { padding:.65rem .9rem; border-top:1px solid var(--bord); background:rgba(8,12,16,.9); backdrop-filter:blur(20px); display:flex; align-items:flex-end; gap:.45rem }
.minp { flex:1; background:var(--sur); border:1px solid var(--bord); border-radius:13px; padding:.58rem .9rem; color:var(--text); font-family:'DM Sans',sans-serif; font-size:.87rem; outline:none; resize:none; max-height:110px; transition:border-color .2s; line-height:1.4 }
.minp:focus { border-color:rgba(0,229,192,.3) }
.minp::placeholder { color:var(--muted) }
.abtn { width:36px; height:36px; border-radius:10px; background:rgba(255,255,255,.05); border:1px solid var(--bord); color:var(--muted); font-size:1.05rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .2s; flex-shrink:0; align-self:flex-end }
.abtn:hover { color:var(--acc); border-color:rgba(0,229,192,.3) }
.sbtn { width:36px; height:36px; border-radius:10px; background:var(--acc); color:var(--bg); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:.95rem; flex-shrink:0; align-self:flex-end; transition:all .2s }
.sbtn:hover { box-shadow:0 0 18px rgba(0,229,192,.4) }
.sbtn:active { transform:scale(.92) }
.sbtn:disabled { opacity:.35; cursor:not-allowed; transform:none; box-shadow:none }

/* ══════════════════════════════════
   IN-APP NOTIF & TOAST
══════════════════════════════════ */
.inotif { position:fixed; top:1rem; left:50%; transform:translateX(-50%) translateY(-80px); background:var(--card); border:1px solid rgba(0,229,192,.22); border-radius:14px; padding:.7rem 1rem; display:flex; align-items:center; gap:.7rem; box-shadow:0 8px 32px rgba(0,0,0,.4); z-index:9999; transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .3s; opacity:0; cursor:pointer; min-width:220px; max-width:320px }
.inotif.show { transform:translateX(-50%) translateY(0); opacity:1 }
.inf { font-size:.77rem; font-weight:600; color:var(--acc) }
.inm { font-size:.81rem; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:.1rem }

.toast { position:fixed; bottom:2rem; left:50%; transform:translateX(-50%) translateY(80px); background:var(--sur); border:1px solid var(--bord); border-radius:100px; padding:.5rem 1.15rem; font-size:.8rem; z-index:9999; transition:all .3s; opacity:0; white-space:nowrap; box-shadow:0 8px 28px rgba(0,0,0,.4) }
.toast.show { transform:translateX(-50%) translateY(0); opacity:1 }

/* spinner */
.srow { display:flex; align-items:center; justify-content:center; gap:.5rem; color:var(--muted); font-size:.82rem; padding:.75rem 0 }
.spin { width:16px; height:16px; border:2px solid var(--bord); border-top-color:var(--acc); border-radius:50%; animation:sp .7s linear infinite; flex-shrink:0 }
@keyframes sp { to{transform:rotate(360deg)} }
</style>
</head>
<body>

<!-- ══════════════════════════════
     SCREEN 1 — HOME
══════════════════════════════ -->
<div id="s-home" class="screen active">
<div class="inner">
  <div class="brand"><div class="bdot"></div><span class="bname">Spot<b>Me</b></span></div>

  <h1>Privat &amp;<br>Direkt.</h1>
  <p class="sub">Eigener Server · Datei-Versand · Backups<br>Kein Account nötig.</p>

  <div class="spill connecting" id="spill">
    <div class="sdot spin"></div>
    <span id="spill-txt">Verbinde mit Server...</span>
  </div>

  <div class="code-card">
    <div class="code-label">Dein persönlicher Code</div>
    <div class="code-digits" id="mycode">------</div>
    <div class="code-share">
      <button class="csbtn" onclick="copyCode()">📋 Kopieren</button>
      <button class="csbtn" onclick="shareCode()">↗️ Teilen</button>
    </div>
  </div>

  <div class="conn-box">
    <div class="conn-title">Partner verbinden</div>
    <div class="drow" id="drow">
      <input class="dinp" maxlength="1" inputmode="numeric" autocomplete="off">
      <input class="dinp" maxlength="1" inputmode="numeric" autocomplete="off">
      <input class="dinp" maxlength="1" inputmode="numeric" autocomplete="off">
      <input class="dinp" maxlength="1" inputmode="numeric" autocomplete="off">
      <input class="dinp" maxlength="1" inputmode="numeric" autocomplete="off">
      <input class="dinp" maxlength="1" inputmode="numeric" autocomplete="off">
    </div>
    <button class="btn btn-p" id="conn-btn" onclick="connectToPeer()" disabled>💬 Chat öffnen</button>
  </div>

  <div id="prev-sec" style="display:none; margin-top:1.5rem">
    <div class="slabel">Letzte Chats</div>
    <div id="prev-list"></div>
  </div>
</div>
</div>

<!-- ══════════════════════════════
     SCREEN 2 — INCOMING CALL
══════════════════════════════ -->
<div id="s-incoming" class="screen">
<div class="incoming-wrap">
  <div class="caller-avatar">🧑</div>
  <div>
    <div class="caller-name" id="caller-name">...</div>
    <div class="caller-code" id="caller-code">Code: ...</div>
  </div>
  <div class="caller-label">möchte mit dir chatten</div>
  <div class="call-btns">
    <button class="call-btn call-decline" onclick="declineCall()">✕ Ablehnen</button>
    <button class="call-btn call-accept" onclick="acceptCall()">✓ Annehmen</button>
  </div>
</div>
</div>

<!-- ══════════════════════════════
     SCREEN 3 — CHAT
══════════════════════════════ -->
<div id="s-chat" class="screen">

  <div class="chat-bar">
    <button class="ibtn" onclick="goHome()" style="margin-right:.2rem">←</button>
    <div class="peer-wrap">
      <div class="pav off" id="pav">🧑</div>
      <div>
        <div class="pname" id="pname">...</div>
        <div class="pstatus dim" id="pstatus">○ Verbinde...</div>
      </div>
    </div>
    <div class="bar-btns">
      <button class="ibtn" onclick="toggleDrop()">⋮</button>
      <button class="ibtn" onclick="goHome()">✕</button>
    </div>

    <div class="drop" id="drop">
      <button class="mitem" onclick="exportChat()">
        <span class="mico">💾</span>
        <div class="mlab"><div>Chat exportieren</div><div class="mdsc">Als JSON-Backup speichern</div></div>
      </button>
      <button class="mitem" onclick="document.getElementById('imp-file').click(); closeDrop()">
        <span class="mico">📂</span>
        <div class="mlab"><div>Chat importieren</div><div class="mdsc">JSON-Backup einspielen</div></div>
      </button>
      <div class="msep"></div>
      <button class="mitem red" onclick="clearChat()">
        <span class="mico">🗑️</span>
        <div class="mlab"><div>Verlauf löschen</div><div class="mdsc">Nur auf diesem Gerät</div></div>
      </button>
    </div>
    <input type="file" id="imp-file" accept=".json" style="display:none" onchange="importChat(this)">
  </div>

  <div class="rcbar" id="rcbar">
    <span>○ Verbindung unterbrochen</span>
    <button class="rcbtn" onclick="tryReconnect()">↺ Erneut verbinden</button>
  </div>

  <div class="messages" id="messages">
    <div class="empty" id="ehint">
      <div class="eico">💬</div>
      <div class="srow"><div class="spin"></div>Verbindung wird aufgebaut...</div>
    </div>
  </div>

  <div class="input-wrap">
    <div class="upbar" id="upbar"><div class="upfill" id="upfill"></div></div>
    <div class="input-bar">
      <button class="abtn" onclick="document.getElementById('file-inp').click()" title="Datei senden">📎</button>
      <input type="file" id="file-inp" style="display:none" onchange="sendFile(this)">
      <textarea class="minp" id="minp" placeholder="Nachricht..." rows="1"
        oninput="autoH(this)" onkeydown="hkey(event)"></textarea>
      <button class="sbtn" id="sbtn" onclick="sendMsg()" disabled>➤</button>
    </div>
  </div>
</div>

<!-- In-App Notification -->
<div class="inotif" id="inotif" onclick="switchToChat()">
  <span style="font-size:1.2rem;flex-shrink:0">💬</span>
  <div style="flex:1;min-width:0">
    <div class="inf" id="inf">...</div>
    <div class="inm" id="inm">...</div>
  </div>
</div>

<!-- ══════════════════════════════
     JAVASCRIPT
══════════════════════════════ -->
<script>
'use strict';

/* ══ CONFIG — Serveradresse hier anpassen ══ */
const SERVER_HOST = 'spotme-chat.onrender.com';
const SERVER_PATH = '/peerjs/app';

/* ══ STATE ══ */
let peer        = null;
let conn        = null;
let pendingConn = null;   // eingehende Verbindung, noch nicht angenommen
let myCode      = '';
let myName      = '';
let partnerCode = '';
let partnerName = '';
let chatId      = '';
let lastDate    = null;
let unread      = 0;

const CHUNK = 16384; // 16 KB
let fileBufs = {};

/* ══ INIT ══ */
window.addEventListener('load', () => {
  myCode = localStorage.getItem('sm_code') || newCode();
  myName = localStorage.getItem('sm_name') || newName();
  localStorage.setItem('sm_code', myCode);
  localStorage.setItem('sm_name', myName);

  document.getElementById('mycode').textContent = myCode.slice(0,3) + ' · ' + myCode.slice(3,6);
  initDigits();
  renderPrev();
  wakeServer();

  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }

  // Close dropdown on outside click
  document.addEventListener('click', e => {
    if (!e.target.closest('.bar-btns') && !e.target.closest('.drop')) closeDrop();
  });
});

function newCode() { return String(Math.floor(100000 + Math.random() * 900000)); }
function newName() {
  const a = ['Shadow','Night','Swift','Dark','Ghost','Urban','Neon','Wild','Lunar','Ember'];
  const b = ['Wolf','Fox','Bear','Eagle','Tiger','Lynx','Raven','Hawk','Storm','Viper'];
  return `${a[Math.random()*a.length|0]}_${b[Math.random()*b.length|0]}`;
}

/* ══ SERVER WAKEUP (Render.com Free Tier schläft ein) ══ */
async function wakeServer() {
  setSpill('connecting', 'Server wird gestartet...');
  try {
    const res = await fetch('https://' + SERVER_HOST + '/', { signal: AbortSignal.timeout(20000) });
    if (res.ok) { setSpill('connecting', 'Verbinde mit PeerJS...'); }
  } catch(e) {
    // Server nicht erreichbar — trotzdem versuchen
  }
  initPeer();
}

/* ══ PEERJS ══ */
function initPeer() {
  setSpill('connecting', 'Verbinde mit Server...');
  if (peer) { try { peer.destroy(); } catch(e){} }

  peer = new Peer(myCode, {
    host: SERVER_HOST,
    port: 443,
    path: SERVER_PATH,
    secure: true,
    config: {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' }
      ]
    }
  });

  peer.on('open', () => {
    setSpill('online', '● Online · Code aktiv');
  });

  peer.on('error', err => {
    console.warn('PeerJS:', err.type);
    if (err.type === 'unavailable-id') {
      // Code vergeben — neuen generieren
      myCode = newCode();
      localStorage.setItem('sm_code', myCode);
      document.getElementById('mycode').textContent = myCode.slice(0,3) + ' · ' + myCode.slice(3,6);
      initPeer();
      return;
    }
    setSpill('offline', '⚠️ Verbindungsfehler');
    setTimeout(initPeer, 6000);
  });

  peer.on('disconnected', () => {
    setSpill('connecting', 'Verbindung unterbrochen...');
    setTimeout(() => { if (peer && !peer.destroyed) peer.reconnect(); }, 4000);
  });

  // ── Eingehender Anruf → Annahme-Screen zeigen ──
  peer.on('connection', incomingConn => {
    // Bereits verbunden → ablehnen
    if (conn) { incomingConn.close(); return; }

    pendingConn  = incomingConn;
    partnerCode  = incomingConn.peer;
    partnerName  = incomingConn.metadata?.name || 'Unbekannt_' + partnerCode;

    document.getElementById('caller-name').textContent = partnerName;
    document.getElementById('caller-code').textContent = 'Code: ' + partnerCode;

    showScreen('s-incoming');
    pushNotif(partnerName, 'möchte mit dir chatten');
    inAppNotif(partnerName, 'Eingehender Chat');
  });
}

/* ══ CALL ACCEPT / DECLINE ══ */
function acceptCall() {
  if (!pendingConn) return;
  conn        = pendingConn;
  pendingConn = null;
  chatId      = buildCID(myCode, partnerCode);
  setupConn(false);
  prepChat();
  showScreen('s-chat');
}

function declineCall() {
  if (pendingConn) { try { pendingConn.close(); } catch(e){} pendingConn = null; }
  showScreen('s-home');
}

/* ══ CONNECT (Caller) ══ */
function connectToPeer() {
  const code = getDigits();
  if (code.length !== 6) return;
  if (code === myCode) { toast('⚠️ Das ist dein eigener Code'); return; }
  partnerCode = code;
  partnerName = 'Nutzer_' + code;
  chatId      = buildCID(myCode, code);
  conn        = peer.connect(code, { reliable:true, metadata:{ name: myName } });
  setupConn(true); // true = wir sind Anrufer
  prepChat();
  showScreen('s-chat');
}

/* ══ RECONNECT ══ */
function tryReconnect() {
  document.getElementById('rcbar').classList.remove('show');
  if (!partnerCode) return;
  conn = peer.connect(partnerCode, { reliable:true, metadata:{ name: myName } });
  setupConn(true);
  toast('↺ Verbinde erneut...');
}

/* ══ SETUP CONN ══ */
function setupConn(isCaller) {
  document.getElementById('sbtn').disabled = true;

  // ── Wichtig: Verbindung kann bereits offen sein (z.B. wenn Empfänger
  //    erst nach einigen Sekunden "Annehmen" tippt). In dem Fall feuert
  //    conn.on('open') nie mehr → wir prüfen sofort und handeln direkt.
  const onOpen = () => {
    conn.send({ t:'hi', name: myName, code: myCode });
    if (isCaller) setChatOnline(true);
  };

  if (conn.open) {
    // Bereits offen → sofort ausführen
    onOpen();
  } else {
    conn.on('open', onOpen);
  }

  conn.on('data', data => {
    if (data.t === 'hi') {
      partnerName = data.name || ('Nutzer_' + partnerCode);
      partnerCode = data.code || partnerCode;
      chatId      = buildCID(myCode, partnerCode);
      document.getElementById('pname').textContent = partnerName;
      updateIdx('');

      // setChatOnline immer NACH prepChat aufrufen – sonst sbtn wieder disabled
      setChatOnline(true);

      // Empfänger: Screen zeigen (prepChat bereits in acceptCall gemacht)
      if (!isCaller) showScreen('s-chat');

    } else {
      handleData(data);
    }
  });

  conn.on('close', () => {
    setChatOnline(false);
    document.getElementById('sbtn').disabled = true;
    document.getElementById('rcbar').classList.add('show');
    toast('○ Verbindung getrennt');
  });

  conn.on('error', () => {
    setChatOnline(false);
    document.getElementById('rcbar').classList.add('show');
  });
}

function setChatOnline(on) {
  const sl = document.getElementById('pstatus');
  const av = document.getElementById('pav');
  if (on) {
    sl.textContent = '● Verbunden';
    sl.className   = 'pstatus';
    av.className   = 'pav';
    document.getElementById('sbtn').disabled = false;
    document.getElementById('rcbar').classList.remove('show');
    // Remove loading hint
    const h = document.getElementById('ehint');
    if (h) { h.innerHTML = `<div class="eico">💬</div><div style="font-weight:500">Verbunden!</div><div style="font-size:.7rem;margin-top:.4rem;opacity:.5">🔒 P2P · Lokal gespeichert</div>`; }
  } else {
    sl.textContent = '○ Verbindung getrennt';
    sl.className   = 'pstatus dim';
    av.className   = 'pav off';
  }
}

function prepChat() {
  document.getElementById('pname').textContent   = partnerName;
  document.getElementById('pstatus').textContent = '○ Verbinde...';
  document.getElementById('pstatus').className   = 'pstatus dim';
  document.getElementById('pav').className       = 'pav off';
  document.getElementById('sbtn').disabled       = true;
  document.getElementById('rcbar').classList.remove('show');
  const list = document.getElementById('messages');
  list.innerHTML = `<div class="empty" id="ehint"><div class="eico">💬</div><div class="srow"><div class="spin"></div>Verbindung wird aufgebaut...</div></div>`;
  lastDate = null;
  loadHistory();
}

/* ══ SEND TEXT ══ */
function sendMsg() {
  const inp = document.getElementById('minp');
  const text = inp.value.trim();
  if (!text || !conn || conn.open === false) return;
  const msg = { t:'text', text, ts: Date.now() };
  conn.send(msg);
  appendMsg({ ...msg, own:true });
  persistMsg({ ...msg, own:true });
  inp.value = ''; inp.style.height = 'auto';
}

/* ══ SEND FILE ══ */
async function sendFile(input) {
  const file = input.files[0];
  input.value = '';
  if (!file || !conn) return;
  if (file.size > 100 * 1024 * 1024) { toast('⚠️ Max. 100 MB'); return; }

  const id     = Math.random().toString(36).slice(2, 10);
  const total  = Math.ceil(file.size / CHUNK);

  conn.send({ t:'file-start', id, name:file.name, fileType:file.type, size:file.size, totalChunks:total });
  showUP(true);
  toast(`📤 Sende "${file.name}"...`);

  const reader = new FileReader();
  let offset = 0, chunk = 0;

  reader.onload = async e => {
    conn.send({ t:'file-chunk', id, index:chunk, data:e.target.result });
    offset += CHUNK; chunk++;
    document.getElementById('upfill').style.width = Math.floor((chunk/total)*100) + '%';
    if (offset < file.size) {
      if (chunk % 20 === 0) await new Promise(r => setTimeout(r, 20));
      reader.readAsArrayBuffer(file.slice(offset, offset + CHUNK));
    } else {
      conn.send({ t:'file-end', id });
      showUP(false);
      toast(`✅ "${file.name}" gesendet!`);
      const url = await fileDataUrl(file);
      const msg = { t:'file', name:file.name, fileType:file.type, size:file.size, data:url, ts:Date.now(), own:true };
      appendMsg(msg); persistMsg(msg);
    }
  };
  reader.readAsArrayBuffer(file.slice(0, CHUNK));
}

function showUP(v) {
  const el = document.getElementById('upbar');
  el.style.opacity = v ? '1' : '0';
  if (!v) setTimeout(() => { document.getElementById('upfill').style.width = '0%'; }, 300);
}
function fileDataUrl(f) { return new Promise((r,j) => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.onerror = j; rd.readAsDataURL(f); }); }

/* ══ RECEIVE DATA ══ */
function handleData(d) {
  if (d.t === 'text') {
    const msg = { ...d, own:false };
    appendMsg(msg); persistMsg(msg); updateIdx(d.text);
    notify(d.text);
  } else if (d.t === 'file-start') {
    fileBufs[d.id] = { meta:d, chunks:new Array(d.totalChunks).fill(null) };
    toast(`📥 Empfange "${d.name}"...`);
  } else if (d.t === 'file-chunk') {
    const b = fileBufs[d.id];
    if (b) b.chunks[d.index] = d.data;
  } else if (d.t === 'file-end') {
    const b = fileBufs[d.id];
    if (!b) return;
    const valid = b.chunks.filter(c => c !== null);
    if (valid.length !== b.meta.totalChunks) { toast('❌ Übertragungsfehler'); return; }
    const blob = new Blob(valid, { type:b.meta.fileType });
    const rd = new FileReader();
    rd.onload = e => {
      const msg = { t:'file', name:b.meta.name, fileType:b.meta.fileType, size:b.meta.size, data:e.target.result, ts:Date.now(), own:false };
      appendMsg(msg); persistMsg(msg); updateIdx('📎 ' + b.meta.name);
      notify('📎 Datei empfangen: ' + b.meta.name);
      delete fileBufs[d.id];
    };
    rd.readAsDataURL(blob);
  }
}

/* ══ RENDER MSG ══ */
function appendMsg(msg) {
  const list = document.getElementById('messages');
  const hint = document.getElementById('ehint');
  if (hint && hint.querySelector('.spin')) { /* keep loading hint */ } else if (hint) hint.remove();

  const d  = new Date(msg.ts);
  const ds = d.toLocaleDateString('de-DE', { weekday:'long', day:'2-digit', month:'long' });
  const ts = d.toLocaleTimeString('de-DE', { hour:'2-digit', minute:'2-digit' });

  if (ds !== lastDate) {
    lastDate = ds;
    const sep = document.createElement('div');
    sep.className = 'dsep';
    sep.textContent = ds;
    list.appendChild(sep);
  }

  const w = document.createElement('div');
  w.className = 'msg ' + (msg.own ? 'msg-o' : 'msg-i');

  let html = '';
  if (msg.t === 'text') {
    html = `<div class="bbl"><div class="btxt">${esc(msg.text)}</div><div class="btime">${ts}${msg.own?' ✓✓':''}</div></div>`;
  } else if (msg.t === 'file') {
    const isImg = msg.fileType && msg.fileType.startsWith('image/');
    if (isImg) {
      html = `<div class="imgbbl" onclick="bigImg('${msg.data}')"><img src="${msg.data}" loading="lazy"></div><div class="btime">${ts}${msg.own?' ✓✓':''}</div>`;
    } else {
      html = `<a class="filbbl" href="${msg.data}" download="${esc(msg.name)}"><span class="fico">${fEmoji(msg.fileType)}</span><div class="fmeta"><div class="fname">${esc(msg.name)}</div><div class="fsize">${fmtSz(msg.size||0)} · Tippen zum Speichern</div></div></a><div class="btime">${ts}${msg.own?' ✓✓':''}</div>`;
    }
  }

  w.innerHTML = html;
  list.appendChild(w);
  list.scrollTop = list.scrollHeight;
}

function bigImg(url) { const w = window.open(); w.document.write(`<style>body{margin:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh}img{max-width:100%;max-height:100vh}</style><img src="${url}">`); }
function fEmoji(t) { if (!t) return '📄'; if (t.includes('pdf')) return '📕'; if (t.includes('zip')) return '🗜️'; if (t.includes('video')) return '🎥'; return '📄'; }
function fmtSz(b) { if (b < 1024) return b + 'B'; if (b < 1048576) return (b/1024).toFixed(1) + 'KB'; return (b/1048576).toFixed(1) + 'MB'; }

/* ══ PERSISTENCE ══ */
function buildCID(a, b) { return 'sm_' + [a, b].sort().join('_'); }

function persistMsg(m) {
  if (!chatId) return;
  const k = 'smmsg_' + chatId;
  const arr = JSON.parse(localStorage.getItem(k) || '[]');
  arr.push(m);
  if (arr.length > 300) arr.splice(0, arr.length - 300);
  localStorage.setItem(k, JSON.stringify(arr));
}

function loadHistory() {
  if (!chatId) return;
  lastDate = null;
  const list = document.getElementById('messages');
  const arr  = JSON.parse(localStorage.getItem('smmsg_' + chatId) || '[]');
  // Remove loading spinner before history
  const h = document.getElementById('ehint');
  if (h) h.remove();
  arr.forEach(m => appendMsg(m));
}

function updateIdx(preview) {
  if (!chatId) return;
  const k = 'sm_idx';
  const idx = JSON.parse(localStorage.getItem(k) || '[]');
  const i = idx.findIndex(c => c.id === chatId);
  const e = { id:chatId, partner:partnerName, code:partnerCode, ts:Date.now(), preview };
  if (i >= 0) idx[i] = e; else idx.unshift(e);
  localStorage.setItem(k, JSON.stringify(idx.slice(0, 20)));
  renderPrev();
}

/* ══ PREV CHATS ══ */
function renderPrev() {
  const idx = JSON.parse(localStorage.getItem('sm_idx') || '[]');
  const sec = document.getElementById('prev-sec');
  const lst = document.getElementById('prev-list');
  if (!idx.length) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';
  lst.innerHTML = idx.map(c => {
    const d = new Date(c.ts);
    const t = d.toLocaleDateString('de-DE') === new Date().toLocaleDateString('de-DE')
      ? d.toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'})
      : d.toLocaleDateString('de-DE', {day:'2-digit', month:'2-digit'});
    return `
    <div class="chat-item" onclick="reconnectTo('${c.code}','${esc(c.partner)}','${c.id}')">
      <div class="cav">🧑</div>
      <div class="cinfo">
        <div class="cname">${esc(c.partner)}</div>
        <div class="cprev">${esc(c.preview || '—')}</div>
      </div>
      <div class="cmeta">
        <div class="ctime">${t}</div>
        <div class="ctag">${c.code}</div>
      </div>
    </div>`;
  }).join('');
}

/* ── Vorhandenen Chat öffnen → ERST verbinden, dann Chat öffnen ── */
function reconnectTo(code, name, cid) {
  partnerCode = code;
  partnerName = name;
  chatId      = cid;
  // Verbindung aufbauen — der Partner bekommt den Incoming-Screen
  conn = peer.connect(code, { reliable:true, metadata:{ name: myName } });
  setupConn(true);
  prepChat();
  showScreen('s-chat');
}

/* ══ CHAT MENU ACTIONS ══ */
function clearChat() {
  if (!confirm('Verlauf auf diesem Gerät löschen?')) return;
  closeDrop();
  if (!chatId) return;
  localStorage.removeItem('smmsg_' + chatId);
  // Aus Index entfernen
  const k = 'sm_idx';
  const idx = JSON.parse(localStorage.getItem(k) || '[]');
  localStorage.setItem(k, JSON.stringify(idx.filter(c => c.id !== chatId)));
  document.getElementById('messages').innerHTML = '<div class="empty"><div class="eico">🗑️</div><div>Verlauf gelöscht.</div></div>';
  lastDate = null;
  renderPrev();
  toast('🗑️ Verlauf gelöscht');
}

function exportChat() {
  closeDrop();
  if (!chatId) { toast('⚠️ Kein aktiver Chat'); return; }
  const msgs = JSON.parse(localStorage.getItem('smmsg_' + chatId) || '[]');
  const data = JSON.stringify({ version:1, partner:partnerName, code:partnerCode, chatId, messages:msgs }, null, 2);
  const blob = new Blob([data], { type:'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = `SpotMe_${partnerName}_${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(url);
  toast('💾 Backup exportiert');
}

function importChat(input) {
  closeDrop();
  if (!chatId || !input.files[0]) return;
  const rd = new FileReader();
  rd.onload = e => {
    try {
      const d = JSON.parse(e.target.result);
      if (!d.messages) { toast('❌ Keine Nachrichten gefunden'); return; }
      // Merge — no duplicates
      const ex  = JSON.parse(localStorage.getItem('smmsg_' + chatId) || '[]');
      const set = new Set(ex.map(m => m.ts + '_' + (m.text || m.name || '')));
      let added = 0;
      const inc = d.messages.filter(m => {
        const k = m.ts + '_' + (m.text || m.name || '');
        if (set.has(k)) return false; set.add(k); added++; return true;
      });
      const merged = [...ex, ...inc].sort((a,b) => a.ts - b.ts);
      localStorage.setItem('smmsg_' + chatId, JSON.stringify(merged));
      document.getElementById('messages').innerHTML = ''; lastDate = null;
      loadHistory();
      toast(`✅ ${added} Nachrichten importiert`);
    } catch { toast('❌ Fehler beim Importieren'); }
  };
  rd.readAsText(input.files[0]);
  input.value = '';
}

/* ══ NOTIFICATIONS ══ */
function notify(text) {
  const onChat = document.getElementById('s-chat').classList.contains('active');
  if (!onChat || document.hidden) {
    inAppNotif(partnerName, text);
    pushNotif(partnerName, text);
  }
}
function pushNotif(from, text) {
  if (Notification.permission !== 'granted') return;
  try {
    const n = new Notification('💬 ' + from, { body:text.length > 80 ? text.slice(0,80)+'…':text, tag:'spotme', renotify:true });
    n.onclick = () => { window.focus(); switchToChat(); n.close(); };
    setTimeout(() => n.close(), 6000);
  } catch(e) {}
}
let inTimer = null;
function inAppNotif(from, text) {
  document.getElementById('inf').textContent = '💬 ' + from;
  document.getElementById('inm').textContent = text.length > 60 ? text.slice(0,60)+'…' : text;
  const el = document.getElementById('inotif'); el.classList.add('show');
  clearTimeout(inTimer); inTimer = setTimeout(() => el.classList.remove('show'), 5000);
}
function switchToChat() { document.getElementById('inotif').classList.remove('show'); showScreen('s-chat'); }

/* ══ UI HELPERS ══ */
function initDigits() {
  const inputs = document.querySelectorAll('.dinp');
  inputs.forEach((inp, i) => {
    inp.addEventListener('input', e => {
      const v = e.target.value.replace(/\D/g, '');
      e.target.value = v ? v.slice(-1) : '';
      inp.classList.toggle('filled', !!inp.value);
      if (inp.value && i < inputs.length - 1) inputs[i+1].focus();
      checkDigs();
    });
    inp.addEventListener('keydown', e => {
      if (e.key === 'Backspace' && !inp.value && i > 0) { inputs[i-1].value = ''; inputs[i-1].classList.remove('filled'); inputs[i-1].focus(); checkDigs(); }
    });
    inp.addEventListener('paste', e => {
      e.preventDefault();
      const p = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g,'').slice(0,6);
      p.split('').forEach((ch, j) => { if (inputs[i+j]) { inputs[i+j].value = ch; inputs[i+j].classList.add('filled'); } });
      inputs[Math.min(i + p.length, inputs.length-1)].focus();
      checkDigs();
    });
  });
}
function checkDigs() { document.getElementById('conn-btn').disabled = getDigits().length !== 6; }
function getDigits() { return [...document.querySelectorAll('.dinp')].map(i => i.value).join(''); }

function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function setSpill(type, text) { const el=document.getElementById('spill'); const tx=document.getElementById('spill-txt'); el.className='spill '+type; tx.textContent=text; const d=el.querySelector('.sdot'); if(d) d.className=type==='connecting'?'sdot spin':'sdot'; }

function toggleDrop() { document.getElementById('drop').classList.toggle('show'); }
function closeDrop()  { document.getElementById('drop').classList.remove('show'); }

function goHome() {
  if (conn) { try { conn.close(); } catch(e){} conn = null; }
  pendingConn = null; lastDate = null;
  document.querySelectorAll('.dinp').forEach(i => { i.value=''; i.classList.remove('filled'); });
  document.getElementById('conn-btn').disabled = true;
  closeDrop(); showScreen('s-home'); renderPrev();
}

function copyCode() {
  const t = myCode.slice(0,3)+'-'+myCode.slice(3,6);
  navigator.clipboard.writeText(t).then(() => toast('✅ Code kopiert: ' + t)).catch(() => toast('Code: ' + t));
}
function shareCode() {
  const t = myCode.slice(0,3)+'-'+myCode.slice(3,6);
  if (navigator.share) navigator.share({ title:'SpotMe Code', text:'Mein Code: '+t+' – schreib mir!' });
  else copyCode();
}

function autoH(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,110)+'px'; }
function hkey(e) { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); } }
function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

let tTimer = null;
function toast(msg, ms=2400) {
  const ex = document.querySelector('.toast'); if (ex) ex.remove();
  const t = document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.body.appendChild(t);
  requestAnimationFrame(() => requestAnimationFrame(() => t.classList.add('show')));
  clearTimeout(tTimer); tTimer = setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, ms);
}
</script>
