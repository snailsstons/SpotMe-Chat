<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SpotMe · Chat</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.4/peerjs.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════
   VARIABLES & RESET
══════════════════════════════ */
:root {
  --bg:      #080c10;
  --sur:     #0f1520;
  --card:    #131c2b;
  --border:  rgba(255,255,255,0.07);
  --accent:  #00e5c0;
  --p2:      #7b5cfa;
  --p3:      #ff4f7b;
  --text:    #e8edf5;
  --muted:   #5a6a80;
  --green:   #22d46e;
  --r:       16px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}

/* ══════════════════════════════
   SCREENS & LAYOUT
══════════════════════════════ */
.screen{display:none;position:fixed;inset:0;flex-direction:column;background:var(--bg)}
.screen.active{display:flex;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:none}}
.scroll-inner{flex:1;overflow-y:auto;padding:1.5rem 1.25rem 5rem;max-width:480px;width:100%;margin:0 auto}

/* ══════════════════════════════
   BRAND & TYPOGRAPHY
══════════════════════════════ */
.brand{display:flex;align-items:center;gap:.5rem;margin-bottom:2.5rem}
.dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent);animation:blink 2s ease infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.brand-name{font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;color:var(--accent);letter-spacing:-.02em}
.brand-name b{color:var(--text)}
h1{font-family:'Syne',sans-serif;font-weight:800;font-size:2.2rem;letter-spacing:-.03em;line-height:1.1;margin-bottom:.5rem}
h2{font-family:'Syne',sans-serif;font-weight:700;font-size:1.5rem;letter-spacing:-.02em;margin-bottom:.4rem}
.sub{color:var(--muted);font-size:.88rem;font-weight:300;line-height:1.6;margin-bottom:1.75rem}

/* ══════════════════════════════
   MY CODE CARD
══════════════════════════════ */
.code-card{
  background:linear-gradient(135deg,rgba(0,229,192,.08),rgba(123,92,250,.08));
  border:1px solid rgba(0,229,192,.2);
  border-radius:20px; padding:1.5rem; text-align:center;
  margin-bottom:1.75rem; position:relative; overflow:hidden;
}
.code-label{font-size:.72rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.75rem}
.code-digits{
  display:flex;align-items:center;justify-content:center;gap:.4rem;
  font-family:'Syne',sans-serif;font-weight:800;font-size:2.8rem;
  letter-spacing:.05em;color:var(--accent);
  text-shadow:0 0 40px rgba(0,229,192,.3); margin-bottom:.75rem;
}

/* ══════════════════════════════
   CONNECT FIELD
══════════════════════════════ */
.connect-box{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;margin-bottom:1.25rem}
.connect-title{font-size:.8rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.9rem}
.digit-row{display:flex;gap:.5rem;justify-content:center;margin-bottom:1rem}
.digit-input{
  width:44px;height:54px; border-radius:10px;border:1.5px solid var(--border);
  background:var(--sur);color:var(--text); font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:700;
  text-align:center;outline:none; transition:border-color .2s,box-shadow .2s; caret-color:var(--accent);
}
.digit-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,229,192,.12)}
.digit-input.filled{border-color:rgba(0,229,192,.35);color:var(--accent)}

/* ══════════════════════════════
   STATUS PILL
══════════════════════════════ */
.status-pill{
  display:inline-flex;align-items:center;gap:.45rem;
  padding:.35rem .9rem;border-radius:100px; font-size:.78rem;font-weight:500; margin-bottom:1.5rem;
}
.status-pill.connecting{background:rgba(123,92,250,.1);border:1px solid rgba(123,92,250,.25);color:var(--p2)}
.status-pill.online{background:rgba(34,212,110,.1);border:1px solid rgba(34,212,110,.25);color:var(--green)}
.status-pill.offline{background:rgba(255,79,123,.08);border:1px solid rgba(255,79,123,.2);color:var(--p3)}
.status-dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.status-dot.spin{animation:blink .8s ease infinite}

/* ══════════════════════════════
   BUTTONS
══════════════════════════════ */
.btn{display:flex;align-items:center;justify-content:center;gap:.55rem;padding:.85rem 1.25rem;border-radius:12px;border:none;font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:500;cursor:pointer;transition:all .2s;width:100%}
.btn-primary{background:var(--accent);color:var(--bg);font-weight:600}
.btn-primary:active{transform:scale(.97)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}

/* ══════════════════════════════
   PREV CHATS
══════════════════════════════ */
.section-label{font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:.75rem}
.chat-item{display:flex;align-items:center;gap:.75rem;padding:.75rem;border-radius:12px;cursor:pointer;transition:background .2s;border:1px solid transparent}
.chat-item:hover{background:var(--sur);border-color:var(--border)}
.chat-av{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--p2),var(--p3));display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.chat-info{flex:1;min-width:0}
.chat-name{font-size:.9rem;font-weight:500}
.chat-preview{font-size:.75rem;color:var(--muted);margin-top:.15rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ══════════════════════════════
   CHAT SCREEN & MENU
══════════════════════════════ */
#s-chat{overflow:hidden}
.chat-bar{display:flex;align-items:center;justify-content:space-between;padding:.85rem 1.25rem;border-bottom:1px solid var(--border);background:rgba(8,12,16,.95);backdrop-filter:blur(20px);flex-shrink:0; position:relative; z-index: 100;}
.peer-info{display:flex;align-items:center;gap:.7rem}
.peer-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--p2),var(--p3));display:flex;align-items:center;justify-content:center;font-size:.9rem}
.peer-name{font-weight:600;font-size:.88rem}
.peer-status{font-size:.7rem;color:var(--green);margin-top:.1rem}
.bar-btns {display: flex; gap: 0.5rem;}
.iBtn{width:32px;height:32px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.85rem;transition:all .2s}

.menu-dropdown {
  position: absolute; top: 100%; right: 1.25rem; background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 0.5rem; display: none; flex-direction: column; gap: 0.2rem;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5); min-width: 200px;
}
.menu-dropdown.show { display: flex; animation: sIn 0.2s ease; }
.mitem {
  display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem; border-radius: 8px;
  background: transparent; border: none; color: var(--text); font-family: 'DM Sans', sans-serif;
  text-align: left; cursor: pointer; transition: background 0.2s;
}
.mitem:hover { background: rgba(255,255,255,0.05); }
.mitem.mr { color: var(--p3); }
.micon { font-size: 1.1rem; }
.mlab { display: flex; flex-direction: column; }
.mdesc { font-size: 0.65rem; color: var(--muted); margin-top: 0.1rem; }
.msep { height: 1px; background: var(--border); margin: 0.25rem 0; }

/* ══════════════════════════════
   MESSAGES & FILE UPLOAD
══════════════════════════════ */
.messages{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:.4rem;max-width:480px;width:100%;margin:0 auto}
.date-sep{text-align:center;font-size:.68rem;color:var(--muted);padding:.5rem 0;}
.msg{display:flex;flex-direction:column;max-width:78%;animation:msgIn .2s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(5px) scale(.97)}to{opacity:1;transform:none}}
.msg-out{align-self:flex-end;align-items:flex-end}
.msg-in{align-self:flex-start;align-items:flex-start}
.bubble{padding:.6rem .9rem;border-radius:18px}
.msg-out .bubble{background:var(--accent);color:var(--bg);border-radius:18px 4px 18px 18px}
.msg-in .bubble{background:var(--sur);border:1px solid var(--border);border-radius:4px 18px 18px 18px}
.bubble-txt{font-size:.88rem;line-height:1.5;word-break:break-word;white-space:pre-wrap}
.bubble-time{font-size:.62rem;margin-top:.25rem;opacity:.6}

.file-box { background: rgba(0,0,0,0.2); border-radius: 8px; padding: 0.5rem; margin-bottom: 0.3rem; display:flex; align-items:center; gap: 0.5rem; }
.file-box img { max-width: 100%; border-radius: 4px; max-height: 150px; object-fit: cover; }
.file-link { color: inherit; text-decoration: underline; font-size: 0.8rem; word-break: break-all; }

.empty-chat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.4rem;color:var(--muted);text-align:center;padding:2rem}
.empty-icon{font-size:2.5rem;margin-bottom:.5rem;opacity:.4}

/* UPLOAD BAR */
.upload-progress { height: 3px; background: rgba(255,255,255,0.1); width: 100%; position: absolute; top: 0; left: 0; opacity: 0; transition: opacity 0.3s; }
.upload-bar { height: 100%; background: var(--accent); width: 0%; transition: width 0.1s linear; }

.input-container { position: relative; display: flex; flex-direction: column; width: 100%; max-width: 480px; margin: 0 auto; flex-shrink: 0; }
.input-bar{padding:.7rem 1rem; border-top:1px solid var(--border); background:rgba(8,12,16,.9); backdrop-filter:blur(20px); display:flex; align-items:flex-end; gap:.5rem;}
.msg-inp{flex:1;background:var(--sur);border:1px solid var(--border);border-radius:14px;padding:.6rem .95rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.88rem;outline:none;resize:none;max-height:120px;transition:border-color .2s;line-height:1.4}
.msg-inp:focus{border-color:rgba(0,229,192,.3)}
.action-btn{width:38px;height:38px;border-radius:11px;background:var(--sur);color:var(--muted);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0; transition: color 0.2s, border-color 0.2s;}
.action-btn:hover{color:var(--text); border-color: rgba(255,255,255,0.2);}
.send-btn{width:38px;height:38px;border-radius:11px;background:var(--accent);color:var(--bg);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.95rem;flex-shrink:0;}

/* ══════════════════════════════
   TOAST & NOTIFICATIONS
══════════════════════════════ */
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(80px);background:var(--sur);border:1px solid var(--border);border-radius:100px;padding:.55rem 1.2rem;font-size:.82rem;z-index:9999;transition:all .3s;opacity:0; white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

.in-notif{
  position:fixed;top:1rem;left:50%;transform:translateX(-50%) translateY(-80px);
  background:var(--card);border:1px solid rgba(0,229,192,.25);border-radius:14px;
  padding:.75rem 1.1rem;display:flex;align-items:center;gap:.75rem;
  box-shadow:0 8px 32px rgba(0,0,0,.4);z-index:9999;
  transition:all .3s;opacity:0; cursor:pointer;
}
.in-notif.show{transform:translateX(-50%) translateY(0);opacity:1}
.in-notif-icon{font-size:1.3rem;}
.in-notif-from{font-size:.78rem;font-weight:600;color:var(--accent)}
.in-notif-msg{font-size:.82rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:.1rem}
</style>
</head>
<body>

<div id="s-home" class="screen active">
  <div class="scroll-inner">
    <div class="brand">
      <div class="dot"></div>
      <span class="brand-name">Spot<b>Me</b> Chat</span>
    </div>
    
    <h1>Privat & Direkt.</h1>
    <div class="sub">Eigener Server · Datei-Versand · Backups</div>

    <div id="peer-status" class="status-pill connecting">
      <div class="status-dot spin"></div>
      <span id="peer-status-txt">Verbinde mit Server...</span>
    </div>

    <div class="code-card">
      <div class="code-label">Dein Code</div>
      <div class="code-digits" id="my-code-display">------</div>
    </div>

    <div class="connect-box">
      <div class="connect-title">Partner verbinden</div>
      <div class="digit-row" id="digit-row">
        <input class="digit-input" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off">
        <input class="digit-input" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off">
        <input class="digit-input" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off">
        <input class="digit-input" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off">
        <input class="digit-input" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off">
        <input class="digit-input" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off">
      </div>
      <button class="btn btn-primary" id="connect-btn" onclick="connectToPeer()" disabled>
        💬 Chat öffnen
      </button>
    </div>

    <div id="prev-section" style="display:none; margin-top:2rem;">
      <div class="section-label">Letzte Chats</div>
      <div id="prev-list" style="display:flex; flex-direction:column; gap:.5rem;"></div>
    </div>
  </div>
</div>

<div id="s-chat" class="screen">
  <div class="chat-bar">
    <div class="peer-info">
      <div class="peer-av">🧑</div>
      <div>
        <div class="peer-name" id="peer-name-lbl">Partner</div>
        <div class="peer-status" id="peer-status-lbl">● Verbunden</div>
      </div>
    </div>
    <div class="bar-btns">
      <button class="iBtn" onclick="toggleMenu()">⋮</button>
      <button class="iBtn" onclick="goHome()">✕</button>
    </div>
    
    <div class="menu-dropdown" id="chat-menu">
      <button class="mitem" onclick="exportChat()">
        <div class="micon">💾</div>
        <div class="mlab"><div>Chat exportieren</div><div class="mdesc">Als JSON speichern</div></div>
      </button>
      <button class="mitem" onclick="document.getElementById('import-file').click()">
        <div class="micon">📂</div>
        <div class="mlab"><div>Chat importieren</div><div class="mdesc">Backup einspielen</div></div>
      </button>
      <div class="msep"></div>
      <button class="mitem mr" onclick="clearChat()">
        <div class="micon">🗑️</div>
        <div class="mlab"><div>Verlauf löschen</div><div class="mdesc">Nur auf diesem Gerät</div></div>
      </button>
    </div>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="importChat(this)">
  </div>

  <div class="messages" id="messages">
    <div class="empty-chat" id="empty-hint">
      <div class="empty-icon">💬</div>
      <div>Warte auf Verbindung...</div>
    </div>
  </div>

  <div class="input-container">
    <div class="upload-progress" id="upload-progress"><div class="upload-bar" id="upload-bar"></div></div>
    <div class="input-bar">
      <button class="action-btn" onclick="document.getElementById('file-input').click()" title="Datei senden">📎</button>
      <input type="file" id="file-input" style="display:none" onchange="sendFile(this)">
      
      <textarea class="msg-inp" id="msg-input" placeholder="Nachricht..." rows="1" oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>➤</button>
    </div>
  </div>
</div>

<div class="in-notif" id="in-notif" onclick="switchToChat()">
  <div class="in-notif-icon">💬</div>
  <div>
    <div class="in-notif-from" id="in-notif-from">...</div>
    <div class="in-notif-msg" id="in-notif-msg">...</div>
  </div>
</div>

<script>
'use strict';

/* ───── STATE ───── */
let peer = null;
let conn = null;
let myCode = '';
let partnerCode = '';
let partnerName = 'Partner';
let chatId = '';
let isConnected = false;
let myName = localStorage.getItem('spotme_name') || generateName();
localStorage.setItem('spotme_name', myName);

// Datei-Transfer Speicher
let fileBuffers = {};
const CHUNK_SIZE = 16384; // 16KB pro Datenpaket

function generateName() {
  const a = ['Shadow','Night','Silent','Swift'];
  const b = ['Wolf','Fox','Bear','Lynx'];
  return `${a[Math.random()*a.length|0]}_${b[Math.random()*b.length|0]}_${(Math.random()*89+10)|0}`;
}

if (!localStorage.getItem('spotme_mycode')) {
  localStorage.setItem('spotme_mycode', Math.random().toString().substring(2,8));
}
myCode = localStorage.getItem('spotme_mycode');
document.getElementById('my-code-display').textContent = myCode;

/* ───── INITIALISIERUNG EIGENER SERVER ───── */

// ⚠️ WICHTIG: Ersetze "DEIN-SERVER-NAME.onrender.com" mit der echten URL
function initPeer() {
  setStatus('connecting', 'Verbinde mit eigenem Server...');

  peer = new Peer(myCode, {
    host: 'DEIN-SERVER-NAME.onrender.com', // ← Hier Server-URL eintragen (ohne https://)
    port: 443,                             
    path: '/peerjs/app',                   
    secure: true                           
  });

  peer.on('open', (id) => {
    myCode = id;
    isConnected = true;
    setStatus('online', 'Online (Privater Server)');
  });

  peer.on('error', (err) => {
    console.error("PeerJS Fehler:", err);
    setStatus('offline', '⚠️ Server-Verbindungsfehler');
    setTimeout(() => initPeer(), 5000); 
  });
  
  peer.on('connection', (c) => {
    if (conn) c.close(); 
    else setupConn(c);
  });
}

window.onload = () => {
  setupDigitInputs();
  renderPrevChats();
  initPeer();
  
  if ("Notification" in window && Notification.permission === "default") {
    Notification.requestPermission();
  }
};

/* ───── VERBINDUNGSAUFBAU (P2P) ───── */
function connectToPeer() {
  partnerCode = getDigitCode();
  if (partnerCode.length !== 6 || partnerCode === myCode) return;
  
  setStatus('connecting', 'Verbinde mit ' + partnerCode + '...');
  const c = peer.connect(partnerCode, { reliable: true, metadata: { name: myName } });
  setupConn(c);
}

// 🛠️ DER GEWÜNSCHTE FIX FÜR SETUPCONN
function setupConn(c) {
  conn = c;
  
  // Die Logik, was passieren soll, wenn die Verbindung steht, packen wir in eine Konstante
  const onConnectionOpen = () => {
    partnerCode = conn.peer;
    partnerName = conn.metadata?.name || 'Partner';
    
    // Fallback: Falls buildCID in deiner Version anders heißt, passe es an (z.B. einfach chatId generieren)
    chatId = buildCID(myCode, partnerCode);
    
    document.getElementById('peer-name-lbl').textContent = partnerName;
    document.getElementById('peer-status-lbl').textContent = '● Verbunden';
    document.getElementById('peer-status-lbl').style.color = 'var(--green)';
    document.getElementById('send-btn').disabled = false;
    
    document.getElementById('messages').innerHTML = '';
    loadHistory();
    showScreen('s-chat');
  };

  // 🛠️ DER FIX: Wir prüfen, ob die Verbindung in der Zwischenzeit schon geöffnet wurde!
  if (conn.open) {
    onConnectionOpen(); // Wenn ja, direkt ausführen!
  } else {
    conn.on('open', onConnectionOpen); // Wenn nein, wie gewohnt auf das Event warten
  }

  // Daten und Schließen wie gewohnt abhandeln
  conn.on('data', (data) => {
    // Falls deine Empfangsfunktion 'receiveMessage' heißt, ändere das hier ab:
    if (typeof handleIncomingData === 'function') {
      handleIncomingData(data);
    } else if (typeof receiveMessage === 'function') {
      receiveMessage(data);
    }
  });

  conn.on('close', () => {
    const statusLbl = document.getElementById('peer-status-lbl');
    if(statusLbl) {
        statusLbl.textContent = '○ Verbindung getrennt';
        statusLbl.style.color = 'var(--muted)';
    }
    const sendBtn = document.getElementById('send-btn');
    if(sendBtn) sendBtn.disabled = true;
    conn = null;
  });
}

/* ───── TEXT NACHRICHTEN ───── */
function sendMessage() {
  const inp = document.getElementById('msg-input');
  const text = inp.value.trim();
  if (!text || !conn) return;

  const msg = { type: 'text', text, ts: Date.now() };
  conn.send(msg);
  
  const localMsg = { ...msg, own: true };
  appendMsg(localMsg);
  persistMsg(localMsg);
  
  inp.value = '';
  inp.style.height = 'auto';
}

/* ───── DATEI VERSAND (FILE TRANSFER) ───── */
async function sendFile(input) {
  const file = input.files[0];
  if (!file || !conn) return;
  
  // Datei-Größenlimit (z.B. 100 MB, um Browser-Crash zu vermeiden)
  if (file.size > 100 * 1024 * 1024) {
    toast('⚠️ Datei zu groß (Max 100MB)');
    input.value = '';
    return;
  }

  const fileId = Math.random().toString(36).substr(2, 9);
  const totalChunks = Math.ceil(file.size / CHUNK_SIZE);
  
  // 1. Meta-Daten senden (Start)
  conn.send({
    type: 'file-start', id: fileId, name: file.name, fileType: file.type, size: file.size, totalChunks
  });

  showProgress(true);
  toast(`📤 Sende "${file.name}"...`);

  // 2. Chunks senden
  const reader = new FileReader();
  let offset = 0;
  let chunkIndex = 0;

  reader.onload = async (e) => {
    conn.send({ type: 'file-chunk', id: fileId, index: chunkIndex, data: e.target.result });
    
    offset += CHUNK_SIZE;
    chunkIndex++;
    
    const percent = Math.floor((chunkIndex / totalChunks) * 100);
    document.getElementById('upload-bar').style.width = percent + '%';

    if (offset < file.size) {
      // Kleiner Delay um den Browser nicht zu blockieren
      if (chunkIndex % 20 === 0) await new Promise(r => setTimeout(r, 20));
      readSlice(offset);
    } else {
      // 3. Datei abgeschlossen
      conn.send({ type: 'file-end', id: fileId });
      showProgress(false);
      toast(`✅ "${file.name}" erfolgreich gesendet!`);
      
      // Lokale Anzeige als abgeschlossene Datei generieren (Base64)
      const fullDataUrl = await fileToDataUrl(file);
      const localMsg = { type: 'file', name: file.name, fileType: file.type, data: fullDataUrl, ts: Date.now(), own: true };
      appendMsg(localMsg);
      persistMsg(localMsg);
    }
  };

  const readSlice = o => {
    const slice = file.slice(o, o + CHUNK_SIZE);
    reader.readAsArrayBuffer(slice);
  };
  readSlice(0);
  input.value = '';
}

function fileToDataUrl(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

function showProgress(show) {
  const el = document.getElementById('upload-progress');
  el.style.opacity = show ? '1' : '0';
  if (!show) setTimeout(() => { document.getElementById('upload-bar').style.width = '0%'; }, 300);
}

/* ───── EMPFANGEN (DATA ROUTER) ───── */
function handleIncomingData(data) {
  // Textnachrichten
  if (data.type === 'text') {
    const msg = { ...data, own: false };
    appendMsg(msg);
    persistMsg(msg);
    notifyUser(msg.text);
  }
  
  // Datei-Empfang: Start
  else if (data.type === 'file-start') {
    fileBuffers[data.id] = { meta: data, chunks: new Array(data.totalChunks).fill(null) };
    toast(`📥 Empfange Datei: ${data.name}...`);
  }
  
  // Datei-Empfang: Chunk
  else if (data.type === 'file-chunk') {
    const buf = fileBuffers[data.id];
    if (buf) buf.chunks[data.index] = data.data;
  }
  
  // Datei-Empfang: Ende (Zusammenbauen)
  else if (data.type === 'file-end') {
    const buf = fileBuffers[data.id];
    if (!buf) return;
    
    // ArrayBuffer zusammenfügen
    const validChunks = buf.chunks.filter(c => c !== null);
    if (validChunks.length === buf.meta.totalChunks) {
      const blob = new Blob(validChunks, { type: buf.meta.fileType });
      const reader = new FileReader();
      reader.onload = (e) => {
        const fullDataUrl = e.target.result;
        const localMsg = { type: 'file', name: buf.meta.name, fileType: buf.meta.fileType, data: fullDataUrl, ts: Date.now(), own: false };
        appendMsg(localMsg);
        persistMsg(localMsg);
        notifyUser(`📎 Datei empfangen: ${buf.meta.name}`);
        delete fileBuffers[data.id];
      };
      reader.readAsDataURL(blob);
    } else {
      toast('❌ Übertragungsfehler bei Datei.');
    }
  }
}

function notifyUser(text) {
  const onChat = document.getElementById('s-chat').classList.contains('active');
  if (!onChat || document.hidden) {
    showInAppNotif(partnerName, text);
    if ("Notification" in window && Notification.permission === "granted") {
      new Notification(partnerName, { body: text, icon: '💬' });
    }
  }
}

/* ───── RENDER MESSAGES ───── */
function appendMsg(msg) {
  const list = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = `msg ${msg.own ? 'msg-out' : 'msg-in'}`;
  
  const time = new Date(msg.ts).toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
  let contentHtml = '';

  if (msg.type === 'text') {
    contentHtml = `<div class="bubble-txt">${msg.text.replace(/</g, "&lt;")}</div>`;
  } else if (msg.type === 'file') {
    const isImg = msg.fileType && msg.fileType.startsWith('image/');
    if (isImg) {
      contentHtml = `<div class="file-box"><img src="${msg.data}" alt="img"></div><a href="${msg.data}" download="${msg.name}" class="file-link">💾 ${msg.name} speichern</a>`;
    } else {
      contentHtml = `<div class="file-box">📎 <b>${msg.name}</b></div><a href="${msg.data}" download="${msg.name}" class="file-link">💾 Datei herunterladen</a>`;
    }
  }

  wrap.innerHTML = `<div class="bubble">${contentHtml}<div class="bubble-time">${time}</div></div>`;
  list.appendChild(wrap);
  list.scrollTop = list.scrollHeight;
}

/* ───── HISTORY & STORAGE ───── */
function buildCID(a, b) { return 'sm_' + [a, b].sort().join('_'); }

function persistMsg(msg) {
  if (!chatId) return;
  const k = 'smmsg_' + chatId;
  const arr = JSON.parse(localStorage.getItem(k) || '[]');
  arr.push(msg);
  if (arr.length > 300) arr.splice(0, arr.length - 300); // Max 300 Nachrichten inkl. Bilder
  localStorage.setItem(k, JSON.stringify(arr));
  
  const preview = msg.type === 'file' ? `📎 ${msg.name}` : msg.text;
  updateChatIndex(preview);
}

function loadHistory() {
  if (!chatId) return;
  const arr = JSON.parse(localStorage.getItem('smmsg_' + chatId) || '[]');
  arr.forEach(m => appendMsg(m));
}

function updateChatIndex(previewText) {
  if (!chatId) return;
  const k = 'sm_chat_index';
  const idx = JSON.parse(localStorage.getItem(k) || '[]');
  const i = idx.findIndex(c => c.id === chatId);
  
  const entry = { id: chatId, partner: partnerName, code: partnerCode, ts: Date.now(), preview: previewText };
  if (i >= 0) idx[i] = entry; else idx.unshift(entry);
  localStorage.setItem(k, JSON.stringify(idx.slice(0, 15)));
  renderPrevChats();
}

function renderPrevChats() {
  const idx = JSON.parse(localStorage.getItem('sm_chat_index') || '[]');
  const sec = document.getElementById('prev-section');
  const list = document.getElementById('prev-list');
  if (!idx.length) { sec.style.display = 'none'; return; }
  
  sec.style.display = 'block';
  list.innerHTML = idx.map(c => `
    <div class="chat-item" onclick="openArchived('${c.code}')">
      <div class="chat-av">🧑</div>
      <div class="chat-info">
        <div class="chat-name">${c.partner} <span style="font-size:0.65rem; color:var(--muted)">(${c.code})</span></div>
        <div class="chat-preview">${c.preview || '...'}</div>
      </div>
    </div>
  `).join('');
}

function openArchived(code) {
  partnerCode = code;
  setStatus('connecting', 'Verbinde mit ' + code + '...');
  const c = peer.connect(code, { reliable: true, metadata: { name: myName } });
  setupConn(c);
}

/* ───── CHAT MENU ACTIONS (DATENSICHERUNG) ───── */
function toggleMenu() {
  document.getElementById('chat-menu').classList.toggle('show');
}
window.addEventListener('click', (e) => {
  if (!e.target.closest('.bar-btns') && !e.target.closest('#chat-menu')) {
    document.getElementById('chat-menu').classList.remove('show');
  }
});

function clearChat() {
  if (!chatId) return;
  localStorage.removeItem('smmsg_' + chatId);
  document.getElementById('messages').innerHTML = `<div class="empty-chat"><div class="empty-icon">🗑️</div><div>Verlauf gelöscht.</div></div>`;
  toast("Chat-Verlauf gelöscht.");
  toggleMenu();
}

function exportChat() {
  if (!chatId) return;
  const msgs = JSON.parse(localStorage.getItem('smmsg_' + chatId) || '[]');
  const data = JSON.stringify({ partner: partnerName, code: partnerCode, messages: msgs });
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `SpotMe_Backup_${partnerName}_${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  toast("Chat exportiert.");
  toggleMenu();
}

function importChat(input) {
  if (!chatId || !input.files[0]) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.messages) {
        localStorage.setItem('smmsg_' + chatId, JSON.stringify(data.messages));
        document.getElementById('messages').innerHTML = '';
        loadHistory();
        toast("Chat erfolgreich importiert.");
      }
    } catch (err) {
      toast("Fehler beim Importieren.");
    }
  };
  reader.readAsText(input.files[0]);
  input.value = '';
  toggleMenu();
}

/* ───── UI HELPERS ───── */
function setupDigitInputs() {
  const inputs = document.querySelectorAll('.digit-input');
  inputs.forEach((inp, i) => {
    inp.addEventListener('input', (e) => {
      inp.classList.toggle('filled', !!inp.value);
      if (inp.value && i < 5) inputs[i + 1].focus();
      document.getElementById('connect-btn').disabled = getDigitCode().length !== 6;
    });
    inp.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && !inp.value && i > 0) inputs[i - 1].focus();
    });
  });
}

function getDigitCode() { return [...document.querySelectorAll('.digit-input')].map(i => i.value).join(''); }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function setStatus(type, text) {
  const el = document.getElementById('peer-status');
  const tx = document.getElementById('peer-status-txt');
  el.className = `status-pill ${type}`;
  tx.textContent = text;
  const dot = el.querySelector('.status-dot');
  if (dot) dot.className = type === 'connecting' ? 'status-dot spin' : 'status-dot';
}

function goHome() {
  if (conn) { try { conn.close(); } catch(e){} conn = null; }
  document.querySelectorAll('.digit-input').forEach(i => { i.value=''; i.classList.remove('filled'); });
  document.getElementById('connect-btn').disabled = true;
  document.getElementById('chat-menu').classList.remove('show');
  showScreen('s-home');
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }

function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.classList.add('show'), 10);
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 2500);
}

function showInAppNotif(from, text) {
  const n = document.getElementById('in-notif');
  document.getElementById('in-notif-from').textContent = from;
  document.getElementById('in-notif-msg').textContent = text;
  n.classList.add('show');
  setTimeout(() => n.classList.remove('show'), 4000);
}

function switchToChat() {
  document.getElementById('in-notif').classList.remove('show');
  showScreen('s-chat');
}
</script>
