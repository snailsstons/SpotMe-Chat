<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SpotMe · Profil</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#060a0f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════
   DESIGN TOKENS (identisch mit SpotMe)
════════════════════════════════ */
:root {
  --bg:      #060a0f;
  --sur:     #0c1219;
  --card:    #101820;
  --card2:   #141f2e;
  --bord:    rgba(255,255,255,.08);
  --bord2:   rgba(255,255,255,.13);
  --acc:     #00e5c0;
  --acc-dim: rgba(0,229,192,.12);
  --p2:      #7b5cfa;
  --p3:      #ff4f7b;
  --text:    #dde4f0;
  --muted:   #4e6070;
  --muted2:  #7a8fa8;
  --green:   #1ecc68;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent }
html, body {
  min-height:100%; background:var(--bg); color:var(--text);
  font-family:'DM Sans', sans-serif; font-size:17px; line-height:1.5;
  overscroll-behavior-y:contain;
}

/* ════════════════════════════════
   LAYOUT
════════════════════════════════ */
.page { max-width:480px; margin:0 auto; padding:1.5rem 1.25rem 6rem; }

/* ════════════════════════════════
   BRAND
════════════════════════════════ */
.brand {
  display:flex; align-items:center; gap:.55rem; margin-bottom:2rem;
}
.bdot {
  width:9px; height:9px; border-radius:50%;
  background:var(--acc); box-shadow:0 0 14px var(--acc);
  animation:blink 2.2s ease infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }
.bname { font-family:'Syne',sans-serif; font-weight:800; font-size:1.3rem; color:var(--acc); letter-spacing:-.02em }
.bname b { color:var(--text) }
.btag { font-size:.78rem; color:var(--muted2); margin-left:.3rem }

/* ════════════════════════════════
   PROFILBILD
════════════════════════════════ */
.avatar-wrap {
  display:flex; flex-direction:column; align-items:center; gap:.9rem;
  margin-bottom:2rem;
}
.avatar {
  width:96px; height:96px; border-radius:50%;
  background:linear-gradient(135deg,var(--p2),var(--p3));
  display:flex; align-items:center; justify-content:center;
  font-size:2.6rem; position:relative; overflow:hidden;
  border:2px solid var(--bord2); cursor:pointer; flex-shrink:0;
}
.avatar img { width:100%; height:100%; object-fit:cover; border-radius:50% }
.avatar-hint { font-size:.8rem; color:var(--muted2) }
.avatar-btns { display:flex; gap:.6rem }
.av-btn {
  padding:.38rem .9rem; border-radius:100px;
  border:1px solid var(--bord2); background:transparent;
  color:var(--muted2); font-size:.78rem; cursor:pointer;
  font-family:'DM Sans',sans-serif; transition:all .2s;
}
.av-btn:hover { color:var(--text); border-color:var(--acc) }

/* ════════════════════════════════
   SECTION LABELS
════════════════════════════════ */
.sec-label {
  font-size:.7rem; font-weight:600; letter-spacing:.1em;
  text-transform:uppercase; color:var(--muted); margin-bottom:.8rem;
  margin-top:1.75rem;
}
.sec-label:first-of-type { margin-top:0 }

/* ════════════════════════════════
   FORM FIELDS
════════════════════════════════ */
.field { margin-bottom:1rem }
.field label {
  display:block; font-size:.8rem; font-weight:500;
  color:var(--muted2); margin-bottom:.4rem;
}
.field label span { color:var(--p3); margin-left:.2rem }  /* * Pflichtfeld */

.finp {
  width:100%; padding:.7rem 1rem;
  background:var(--sur); border:1.5px solid var(--bord);
  border-radius:13px; color:var(--text);
  font-family:'DM Sans',sans-serif; font-size:.95rem;
  outline:none; transition:border-color .2s;
  -webkit-appearance:none;
}
.finp:focus { border-color:rgba(0,229,192,.4) }
.finp::placeholder { color:var(--muted) }
.finp[readonly] { opacity:.55; cursor:not-allowed }

select.finp { cursor:pointer }
select.finp option { background:var(--card); color:var(--text) }

textarea.finp { resize:none; min-height:90px; line-height:1.5 }

.char-count { font-size:.7rem; color:var(--muted); text-align:right; margin-top:.3rem }
.char-count.warn { color:var(--p3) }

/* ════════════════════════════════
   RADIO / TOGGLE GROUPS
════════════════════════════════ */
.radio-group { display:flex; flex-wrap:wrap; gap:.5rem }
.radio-opt {
  padding:.42rem .9rem; border-radius:100px;
  border:1.5px solid var(--bord); background:transparent;
  color:var(--muted2); font-size:.82rem; cursor:pointer;
  font-family:'DM Sans',sans-serif; transition:all .2s; user-select:none;
}
.radio-opt:hover { border-color:var(--bord2); color:var(--text) }
.radio-opt.sel { background:var(--acc-dim); border-color:var(--acc); color:var(--acc) }

/* ════════════════════════════════
   TOGGLE (Ja/Nein)
════════════════════════════════ */
.toggle-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:.75rem 0; border-bottom:1px solid var(--bord);
}
.toggle-row:last-child { border-bottom:none }
.toggle-lbl { font-size:.9rem }
.toggle {
  width:44px; height:24px; border-radius:12px;
  background:var(--sur); border:1.5px solid var(--bord2);
  position:relative; cursor:pointer; transition:background .2s, border-color .2s;
  flex-shrink:0;
}
.toggle.on { background:var(--acc); border-color:var(--acc) }
.toggle::after {
  content:''; position:absolute; width:16px; height:16px;
  border-radius:50%; background:#fff; top:2px; left:2px;
  transition:transform .2s; box-shadow:0 1px 4px rgba(0,0,0,.4);
}
.toggle.on::after { transform:translateX(20px) }

/* ════════════════════════════════
   SPOT DROPDOWN (3-stufig)
════════════════════════════════ */
.spot-row { display:grid; grid-template-columns:1fr 1fr; gap:.6rem }
.spot-row .field { margin-bottom:0 }

/* ════════════════════════════════
   SAVE BUTTON
════════════════════════════════ */
.save-bar {
  position:fixed; bottom:0; left:0; right:0;
  padding:.85rem 1.25rem calc(.85rem + env(safe-area-inset-bottom));
  background:rgba(6,10,15,.95); backdrop-filter:blur(20px);
  border-top:1px solid var(--bord);
}
.save-bar-inner { max-width:480px; margin:0 auto }
.btn-save {
  width:100%; padding:.9rem;
  background:var(--acc); color:var(--bg);
  border:none; border-radius:14px;
  font-family:'DM Sans',sans-serif; font-weight:700; font-size:1rem;
  cursor:pointer; transition:all .2s; display:flex; align-items:center; justify-content:center; gap:.5rem;
}
.btn-save:hover { box-shadow:0 0 28px rgba(0,229,192,.35) }
.btn-save:active { transform:scale(.97) }

/* ════════════════════════════════
   BACK LINK
════════════════════════════════ */
.back-link {
  display:inline-flex; align-items:center; gap:.4rem;
  color:var(--muted2); font-size:.85rem; cursor:pointer;
  background:none; border:none; font-family:'DM Sans',sans-serif;
  padding:0; margin-bottom:1.5rem; transition:color .2s;
}
.back-link:hover { color:var(--text) }

/* ════════════════════════════════
   SAVED BADGE
════════════════════════════════ */
.saved-badge {
  display:none; align-items:center; gap:.4rem;
  font-size:.8rem; color:var(--green);
  padding:.3rem .8rem; border-radius:100px;
  background:rgba(30,204,104,.1); border:1px solid rgba(30,204,104,.25);
  margin-left:auto;
}
.saved-badge.show { display:flex }

/* ════════════════════════════════
   TOAST
════════════════════════════════ */
.toast {
  position:fixed; bottom:5.5rem; left:50%;
  transform:translateX(-50%) translateY(30px);
  background:var(--sur); border:1px solid var(--bord2);
  border-radius:100px; padding:.5rem 1.2rem;
  font-size:.82rem; z-index:999; opacity:0;
  transition:all .3s; white-space:nowrap;
  box-shadow:0 8px 28px rgba(0,0,0,.5);
}
.toast.show { transform:translateX(-50%) translateY(0); opacity:1 }

/* ════════════════════════════════
   READONLY YEAR HINT
════════════════════════════════ */
.readonly-hint {
  font-size:.72rem; color:var(--muted);
  margin-top:.3rem;
}
</style>
</head>
<body>

<div class="page">

  <!-- Brand -->
  <div class="brand">
    <div class="bdot"></div>
    <span class="bname">Spot<b>Me</b></span>
    <span class="btag">Profil</span>
    <div class="saved-badge" id="saved-badge">✓ Gespeichert</div>
  </div>

  <button class="back-link" onclick="goBack()">‹ Zurück zum Chat</button>

  <!-- ── PROFILBILD ── -->
  <div class="avatar-wrap">
    <div class="avatar" id="avatar" onclick="document.getElementById('img-inp').click()">
      🧑
    </div>
    <div class="avatar-hint">Tippe auf das Bild zum Ändern</div>
    <div class="avatar-btns">
      <button class="av-btn" onclick="document.getElementById('img-inp').click()">📷 Foto wählen</button>
      <button class="av-btn" onclick="removeAvatar()">✕ Entfernen</button>
    </div>
    <input type="file" id="img-inp" accept="image/*" style="display:none" onchange="loadAvatar(this)">
  </div>

  <!-- ── PFLICHTFELDER ── -->
  <div class="sec-label">Pflichtangaben</div>

  <div class="field">
    <label>Profilname <span>*</span></label>
    <input class="finp" type="text" id="f-name" maxlength="30" placeholder="Dein Name im Chat"
      oninput="autoSave()">
  </div>

  <div class="field">
    <label>Geburtsjahr <span>*</span>
      <span id="age-display" style="color:var(--acc);margin-left:.4rem"></span>
    </label>
    <input class="finp" type="number" id="f-year" min="1940" max="2010"
      placeholder="z.B. 1985" oninput="updateAge(); autoSave()">
    <div class="readonly-hint" id="year-hint" style="display:none">
      🔒 Geburtsjahr kann nicht mehr geändert werden.
    </div>
  </div>

  <div class="field">
    <label>Körpergröße (cm)</label>
    <input class="finp" type="number" id="f-height" min="100" max="230"
      placeholder="z.B. 178" oninput="autoSave()">
  </div>

  <div class="field">
    <label>Gewicht (kg)</label>
    <input class="finp" type="number" id="f-weight" min="30" max="300"
      placeholder="z.B. 75" oninput="autoSave()">
  </div>

  <!-- ── SPOT ── -->
  <div class="sec-label">Dein Spot (Wohnort)</div>
  <div class="field">
    <label>Bundesland / Region <span>*</span></label>
    <select class="finp" id="f-region" onchange="fillProvince(); autoSave()">
      <option value="">— Wählen —</option>
    </select>
  </div>
  <div class="spot-row">
    <div class="field">
      <label>Provinz</label>
      <select class="finp" id="f-province" onchange="fillCity(); autoSave()" disabled>
        <option value="">— Wählen —</option>
      </select>
    </div>
    <div class="field">
      <label>Stadt / Ort</label>
      <select class="finp" id="f-city" onchange="autoSave()" disabled>
        <option value="">— Wählen —</option>
      </select>
    </div>
  </div>

  <!-- ── OPTIONAL ── -->
  <div class="sec-label">Optional</div>

  <div class="field">
    <label>Sexualorientierung</label>
    <div class="radio-group" id="rg-orientation">
      <button class="radio-opt" data-val="hetero" onclick="pick(this,'rg-orientation')">Hetero</button>
      <button class="radio-opt" data-val="homo"   onclick="pick(this,'rg-orientation')">Homo</button>
      <button class="radio-opt" data-val="bi"     onclick="pick(this,'rg-orientation')">Bi</button>
    </div>
  </div>

  <div class="field">
    <label>Sexuelle Rolle</label>
    <div class="radio-group" id="rg-role">
      <button class="radio-opt" data-val="bottom"    onclick="pick(this,'rg-role')">Bottom</button>
      <button class="radio-opt" data-val="top"       onclick="pick(this,'rg-role')">Top</button>
      <button class="radio-opt" data-val="versatile" onclick="pick(this,'rg-role')">Versatile</button>
    </div>
  </div>

  <div style="background:var(--card);border:1px solid var(--bord);border-radius:14px;padding:.5rem 1rem;margin-bottom:1rem">
    <div class="toggle-row">
      <span class="toggle-lbl">Transgender</span>
      <div class="toggle" id="tg-trans" onclick="toggleSwitch(this)"></div>
    </div>
    <div class="toggle-row">
      <span class="toggle-lbl">Crossdresser</span>
      <div class="toggle" id="tg-cross" onclick="toggleSwitch(this)"></div>
    </div>
  </div>

  <div class="field">
    <label>Über mich</label>
    <textarea class="finp" id="f-bio" maxlength="512"
      placeholder="Erzähl etwas über dich... (max. 512 Zeichen)"
      oninput="updateBioCount(); autoSave()"></textarea>
    <div class="char-count" id="bio-count">0 / 512</div>
  </div>

</div><!-- /page -->

<!-- Sticky Save Bar -->
<div class="save-bar">
  <div class="save-bar-inner">
    <button class="btn-save" onclick="saveProfile()">
      💾 Profil speichern
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';

/* ════ GEO DATA ════
   Provinz → Region → Städte
   Quelle: Spanische_Geographie.md
════════════════════ */
const GEO = {
  "Andalusien": {
    "Almería":   ["Almería","Mojácar","Carboneras","Níjar (Las Negras)","Roquetas de Mar","Adra"],
    "Cádiz":     ["Cádiz","Algeciras","Tarifa","Barbate","Conil de la Frontera","Chiclana de la Frontera","El Puerto de Santa María","Rota","Chipiona","Sanlúcar de Barrameda","San Roque","La Línea de la Concepción"],
    "Córdoba":   ["Córdoba","Lucena","Puente Genil"],
    "Granada":   ["Granada","Motril","Salobreña","Almuñécar"],
    "Huelva":    ["Huelva","Matalascañas","Mazagón","Punta Umbría","Isla Cristina","Ayamonte"],
    "Jaén":      ["Jaén","Linares","Úbeda","Baeza"],
    "Málaga":    ["Málaga","Nerja","Torrox","Vélez-Málaga (Torre del Mar)","Torremolinos","Benalmádena","Fuengirola","Marbella","Estepona"],
    "Sevilla":   ["Sevilla","Dos Hermanas","Écija"]
  },
  "Aragón": {
    "Huesca":  ["Huesca","Barbastro","Jaca"],
    "Teruel":  ["Teruel","Alcañiz"],
    "Zaragoza":["Zaragoza","Calatayud","Ejea de los Caballeros"]
  },
  "Asturien": {
    "Asturien":["Gijón","Avilés","Navia","Luarca","Cudillero","Villaviciosa","Ribadesella","Llanes"]
  },
  "Balearen": {
    "Balearen":["Palma (Mallorca)","Alcúdia (Mallorca)","Mahón (Menorca)","Ciutadella (Menorca)","Ibiza Stadt","Sant Antoni de Portmany (Ibiza)"]
  },
  "Baskenland": {
    "Álava":    ["Vitoria-Gasteiz","Llodio"],
    "Biskaya":  ["Bilbao","Muskiz","Getxo","Bermeo","Lekeitio","Ondarroa"],
    "Gipuzkoa": ["San Sebastián","Zarautz","Pasaia","Hondarribia"]
  },
  "Extremadura": {
    "Badajoz": ["Badajoz","Mérida","Don Benito"],
    "Cáceres": ["Cáceres","Plasencia","Trujillo"]
  },
  "Galicien": {
    "A Coruña":   ["A Coruña","Ferrol","Ribeira","Muros","Fisterra","Muxía","Cedeira"],
    "Lugo":       ["Lugo","Viveiro","Burela","Ribadeo"],
    "Ourense":    ["Ourense","Verín"],
    "Pontevedra": ["Vigo","Pontevedra","A Guarda","Baiona","Cangas","Sanxenxo","Vilagarcía de Arousa"]
  },
  "Kanaren": {
    "Las Palmas":             ["Las Palmas de Gran Canaria","Maspalomas","Arrecife (Lanzarote)","Puerto del Rosario (Fuerteventura)"],
    "Santa Cruz de Tenerife": ["Santa Cruz de Tenerife","Puerto de la Cruz","Los Cristianos","San Sebastián de La Gomera","Santa Cruz de La Palma","Valverde (El Hierro)"]
  },
  "Kantabrien": {
    "Kantabrien":["Santander","San Vicente de la Barquera","Comillas","Suances","Santoña","Laredo","Castro Urdiales"]
  },
  "Kastilien-La Mancha": {
    "Albacete":    ["Albacete","Hellín"],
    "Ciudad Real": ["Ciudad Real","Puertollano","Valdepeñas"],
    "Cuenca":      ["Cuenca","Tarancón"],
    "Guadalajara": ["Guadalajara","Sigüenza"],
    "Toledo":      ["Toledo","Talavera de la Reina"]
  },
  "Kastilien-León": {
    "Ávila":      ["Ávila","Arévalo"],
    "Burgos":     ["Burgos","Aranda de Duero","Miranda de Ebro"],
    "León":       ["León","Ponferrada","Astorga"],
    "Palencia":   ["Palencia","Aguilar de Campoo"],
    "Salamanca":  ["Salamanca","Béjar","Ciudad Rodrigo"],
    "Segovia":    ["Segovia","Cuéllar"],
    "Soria":      ["Soria","El Burgo de Osma"],
    "Valladolid": ["Valladolid","Medina del Campo","Tordesillas"],
    "Zamora":     ["Zamora","Benavente"]
  },
  "Katalonien": {
    "Barcelona": ["Barcelona","Badalona","Mataró","Castelldefels","Sitges","Vilanova i la Geltrú"],
    "Girona":    ["Girona","Roses","Palamós","Sant Feliu de Guíxols","Lloret de Mar","Blanes"],
    "Tarragona": ["Tarragona","Calafell","Torredembarra","Salou","Cambrils","L'Ametlla de Mar","Sant Carles de la Ràpita"]
  },
  "La Rioja": {
    "La Rioja":["Logroño","Calahorra","Haro"]
  },
  "Madrid": {
    "Madrid":["Madrid","Alcalá de Henares","Getafe","Móstoles","Aranjuez"]
  },
  "Murcia": {
    "Murcia":["Murcia","Cartagena","San Pedro del Pinatar","San Javier","Mazarrón","Águilas"]
  },
  "Navarra": {
    "Navarra":["Pamplona","Tudela","Estella-Lizarra"]
  },
  "Valencia (Region)": {
    "Alicante":  ["Alicante","Denia","Jávea","Calpe","Altea","Benidorm","Villajoyosa","Santa Pola","Torrevieja"],
    "Castellón": ["Castellón de la Plana","Vinaròs","Peñíscola","Alcossebre","Oropesa del Mar","Benicàssim"],
    "Valencia":  ["Valencia","Sagunto","Cullera","Gandía","Oliva"]
  }
};

/* ════ STATE ════ */
const PROFILE_KEY = 'sm_profile';
let saveTimer = null;
let avatarData = null;

/* ════ INIT ════ */
window.addEventListener('load', () => {
  buildRegions();
  loadProfile();
});

/* ════ GEO DROPDOWNS ════ */
function buildRegions() {
  const sel = document.getElementById('f-region');
  Object.keys(GEO).sort().forEach(r => {
    const o = document.createElement('option');
    o.value = o.textContent = r;
    sel.appendChild(o);
  });
}

function fillProvince() {
  const region = document.getElementById('f-region').value;
  const psel   = document.getElementById('f-province');
  const csel   = document.getElementById('f-city');
  psel.innerHTML = '<option value="">— Wählen —</option>';
  csel.innerHTML = '<option value="">— Wählen —</option>';
  psel.disabled = true; csel.disabled = true;
  if (!region || !GEO[region]) return;
  const provs = Object.keys(GEO[region]);
  if (provs.length === 1 && provs[0] === region) {
    // Region = Provinz (z.B. Asturien, Kanaren-Inseln) → direkt Städte
    psel.value = provs[0];
    fillCityFor(region, provs[0]);
    return;
  }
  provs.sort().forEach(p => {
    const o = document.createElement('option');
    o.value = o.textContent = p;
    psel.appendChild(o);
  });
  psel.disabled = false;
}

function fillCity() {
  const region   = document.getElementById('f-region').value;
  const province = document.getElementById('f-province').value;
  fillCityFor(region, province);
}

function fillCityFor(region, province) {
  const csel = document.getElementById('f-city');
  csel.innerHTML = '<option value="">— Wählen —</option>';
  csel.disabled = true;
  if (!region || !province || !GEO[region]?.[province]) return;
  GEO[region][province].forEach(c => {
    const o = document.createElement('option');
    o.value = o.textContent = c;
    csel.appendChild(o);
  });
  csel.disabled = false;
}

/* ════ AVATAR ════ */
function loadAvatar(input) {
  const f = input.files[0];
  if (!f) return;
  if (f.size > 2 * 1024 * 1024) { toast('⚠️ Max. 2 MB'); return; }
  const rd = new FileReader();
  rd.onload = e => {
    avatarData = e.target.result;
    renderAvatar();
    autoSave();
  };
  rd.readAsDataURL(f);
  input.value = '';
}

function renderAvatar() {
  const av = document.getElementById('avatar');
  if (avatarData) {
    av.innerHTML = `<img src="${avatarData}" alt="Profilbild">`;
  } else {
    av.innerHTML = '🧑';
  }
}

function removeAvatar() {
  avatarData = null;
  renderAvatar();
  autoSave();
}

/* ════ RADIO GROUPS ════ */
function pick(btn, groupId) {
  const group = document.getElementById(groupId);
  const wasSelected = btn.classList.contains('sel');
  group.querySelectorAll('.radio-opt').forEach(b => b.classList.remove('sel'));
  if (!wasSelected) btn.classList.add('sel');  // Toggle: nochmal klicken → deselect
  autoSave();
}

function getRadio(groupId) {
  const sel = document.querySelector(`#${groupId} .radio-opt.sel`);
  return sel ? sel.dataset.val : '';
}

function setRadio(groupId, val) {
  document.querySelectorAll(`#${groupId} .radio-opt`).forEach(b => {
    b.classList.toggle('sel', b.dataset.val === val);
  });
}

/* ════ TOGGLES ════ */
function toggleSwitch(el) {
  el.classList.toggle('on');
  autoSave();
}

function getToggle(id)      { return document.getElementById(id).classList.contains('on'); }
function setToggle(id, val) { document.getElementById(id).classList.toggle('on', !!val); }

/* ════ AGE ════ */
function updateAge() {
  const y = parseInt(document.getElementById('f-year').value);
  const disp = document.getElementById('age-display');
  if (!y || y < 1940 || y > 2010) { disp.textContent = ''; return; }
  const age = new Date().getFullYear() - y;
  disp.textContent = `(${age} Jahre)`;
}

/* ════ BIO COUNTER ════ */
function updateBioCount() {
  const len = document.getElementById('f-bio').value.length;
  const el  = document.getElementById('bio-count');
  el.textContent = `${len} / 512`;
  el.classList.toggle('warn', len > 450);
  // Keine Links / E-Mails erlaubt
  const val = document.getElementById('f-bio').value;
  if (/https?:\/\/|www\.|@[^\s]+\.[a-z]/i.test(val)) {
    toast('⚠️ Links und E-Mail-Adressen sind nicht erlaubt');
    document.getElementById('f-bio').value = val.replace(/https?:\/\/\S+|www\.\S+/gi, '').replace(/@[^\s]+\.[a-z]{2,}/gi, '');
    updateBioCount();
  }
}

/* ════ LOAD PROFILE ════ */
function loadProfile() {
  const raw = localStorage.getItem(PROFILE_KEY);
  if (!raw) return;
  try {
    const p = JSON.parse(raw);

    if (p.name)   document.getElementById('f-name').value   = p.name;
    if (p.height) document.getElementById('f-height').value = p.height;
    if (p.weight) document.getElementById('f-weight').value = p.weight;
    if (p.bio)  { document.getElementById('f-bio').value    = p.bio; updateBioCount(); }

    // Geburtsjahr: einmalig eingebbar
    if (p.year) {
      const yf = document.getElementById('f-year');
      yf.value    = p.year;
      yf.readOnly = true;
      document.getElementById('year-hint').style.display = 'block';
      updateAge();
    }

    // Spot
    if (p.region) {
      document.getElementById('f-region').value = p.region;
      fillProvince();
      if (p.province) {
        document.getElementById('f-province').value = p.province;
        fillCityFor(p.region, p.province);
        if (p.city) document.getElementById('f-city').value = p.city;
      }
    }

    // Optional
    if (p.orientation) setRadio('rg-orientation', p.orientation);
    if (p.role)        setRadio('rg-role', p.role);
    if (p.trans)       setToggle('tg-trans', p.trans);
    if (p.cross)       setToggle('tg-cross', p.cross);

    // Avatar
    if (p.avatar) { avatarData = p.avatar; renderAvatar(); }

    showSavedBadge();
  } catch(e) { console.warn('Profil-Ladefehler:', e); }
}

/* ════ SAVE PROFILE ════ */
function saveProfile() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { toast('⚠️ Profilname ist Pflicht'); document.getElementById('f-name').focus(); return; }

  const yearVal = document.getElementById('f-year').value;
  const year = parseInt(yearVal);
  if (yearVal && (year < 1940 || year > 2010)) { toast('⚠️ Bitte gültiges Geburtsjahr eingeben'); return; }

  const region   = document.getElementById('f-region').value;
  const province = document.getElementById('f-province').value;
  const city     = document.getElementById('f-city').value;
  if (!region) { toast('⚠️ Bitte einen Spot (Region) wählen'); return; }

  const existing = JSON.parse(localStorage.getItem(PROFILE_KEY) || '{}');

  const profile = {
    name,
    year:        year || existing.year || null,  // einmalig — nie überschreiben wenn schon gesetzt
    height:      parseInt(document.getElementById('f-height').value) || null,
    weight:      parseInt(document.getElementById('f-weight').value) || null,
    region,
    province:    province || null,
    city:        city     || null,
    orientation: getRadio('rg-orientation') || null,
    role:        getRadio('rg-role')        || null,
    trans:       getToggle('tg-trans'),
    cross:       getToggle('tg-cross'),
    bio:         document.getElementById('f-bio').value.trim() || null,
    avatar:      avatarData || null,
    updated:     Date.now()
  };

  // Geburtsjahr sperren nach erstem Speichern
  if (profile.year) {
    const yf = document.getElementById('f-year');
    yf.readOnly = true;
    document.getElementById('year-hint').style.display = 'block';
  }

  localStorage.setItem(PROFILE_KEY, JSON.stringify(profile));

  // Profilname auch in SpotMe-Chat übernehmen
  localStorage.setItem('sm_name', name);

  showSavedBadge();
  toast('✅ Profil gespeichert');
}

/* Autosave mit Debounce — kein Toast, kein Pflicht-Check */
function autoSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    const name = document.getElementById('f-name').value.trim();
    if (!name) return; // Pflichtfeld muss gesetzt sein
    try { saveProfile_silent(); } catch(e){}
  }, 1200);
}

function saveProfile_silent() {
  const name    = document.getElementById('f-name').value.trim();
  if (!name) return;
  const existing = JSON.parse(localStorage.getItem(PROFILE_KEY) || '{}');
  const profile = {
    name,
    year:        existing.year || parseInt(document.getElementById('f-year').value) || null,
    height:      parseInt(document.getElementById('f-height').value) || null,
    weight:      parseInt(document.getElementById('f-weight').value) || null,
    region:      document.getElementById('f-region').value   || null,
    province:    document.getElementById('f-province').value || null,
    city:        document.getElementById('f-city').value     || null,
    orientation: getRadio('rg-orientation') || null,
    role:        getRadio('rg-role')        || null,
    trans:       getToggle('tg-trans'),
    cross:       getToggle('tg-cross'),
    bio:         document.getElementById('f-bio').value.trim() || null,
    avatar:      avatarData || null,
    updated:     Date.now()
  };
  localStorage.setItem(PROFILE_KEY, JSON.stringify(profile));
  localStorage.setItem('sm_name', name);
  showSavedBadge();
}

/* ════ HELPERS ════ */
function showSavedBadge() {
  const b = document.getElementById('saved-badge');
  b.classList.add('show');
  setTimeout(() => b.classList.remove('show'), 3000);
}

function goBack() {
  if (document.referrer) history.back();
  else window.location.href = 'spotme-v22.html';
}

let tTimer = null;
function toast(msg, ms=2600) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(tTimer);
  tTimer = setTimeout(() => t.classList.remove('show'), ms);
}
</script>
