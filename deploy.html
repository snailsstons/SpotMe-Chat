<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpotMe Worker Deploy</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 500px; margin: 2rem auto; padding: 0 1rem; }
        label { display: block; margin: 1rem 0 0.3rem; font-weight: bold; }
        input, textarea { width: 100%; padding: 0.7rem; font-size: 1rem; border: 1px solid #ccc; border-radius: 6px; }
        button { margin-top: 1.5rem; padding: 0.9rem 1.8rem; font-size: 1.1rem; background: #f4a261; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #status { margin-top: 1rem; padding: 0.8rem; border-radius: 6px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background: #e2e3e5; color: #383d41; border: 1px solid #d6d8db; }
        pre { background: #f5f5f5; padding: 0.5rem; border-radius: 4px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🚀 SpotMe Worker Deploy</h1>
    <p>Mit dieser Seite wird der Mailbox‑Worker direkt in deinem Cloudflare‑Account bereitgestellt.</p>
    
    <label for="accountId">Cloudflare Account‑ID</label>
    <input type="text" id="accountId" placeholder="z.B. abc123..." required>
    
    <label for="apiToken">API‑Token</label>
    <input type="password" id="apiToken" placeholder="Bearer Token mit Workers Scripts:Edit" required>
    
    <label for="workerName">Worker‑Name (optional)</label>
    <input type="text" id="workerName" value="spotme-mailbox" placeholder="spotme-mailbox">
    
    <button id="deployBtn">🚀 Worker deployen</button>
    
    <div id="status"></div>
    
    <script>
        // Der vollständige Worker-Code (aus der vorherigen Antwort)
        const WORKER_CODE = `export default {
  async fetch(request, env, ctx) {
    const corsHeaders = {
      'Access-Control-Allow-Origin': '*',
      'Access-Control-Allow-Methods': 'GET, POST, OPTIONS',
      'Access-Control-Allow-Headers': 'Content-Type',
    };
    if (request.method === 'OPTIONS') {
      return new Response(null, { headers: corsHeaders });
    }

    const url = new URL(request.url);

    // Nachricht speichern
    if (url.pathname === '/message' && request.method === 'POST') {
      try {
        const { recipient, senderId, senderName, text } = await request.json();
        if (!recipient || !senderId || !text) {
          return new Response('Missing fields', { status: 400, headers: corsHeaders });
        }
        await env.DB.prepare(
          'INSERT INTO offline_messages (recipient, sender_id, sender_name, message_text) VALUES (?, ?, ?, ?)'
        ).bind(recipient, senderId, senderName, text).run();
        return new Response(JSON.stringify({ success: true }), {
          status: 201,
          headers: { ...corsHeaders, 'Content-Type': 'application/json' }
        });
      } catch (e) {
        return new Response(e.message, { status: 500, headers: corsHeaders });
      }
    }

    // Nachrichten abrufen
    if (url.pathname === '/messages' && request.method === 'GET') {
      const recipient = url.searchParams.get('recipient');
      if (!recipient) {
        return new Response('Missing recipient', { status: 400, headers: corsHeaders });
      }
      try {
        const { results } = await env.DB.prepare(
          'SELECT sender_id, sender_name, message_text, timestamp FROM offline_messages WHERE recipient = ? AND delivered = 0'
        ).bind(recipient).all();
        await env.DB.prepare(
          'UPDATE offline_messages SET delivered = 1 WHERE recipient = ? AND delivered = 0'
        ).bind(recipient).run();
        return new Response(JSON.stringify(results), {
          status: 200,
          headers: { ...corsHeaders, 'Content-Type': 'application/json' }
        });
      } catch (e) {
        return new Response(e.message, { status: 500, headers: corsHeaders });
      }
    }

    // Verpassten Anruf speichern
    if (url.pathname === '/missed-call' && request.method === 'POST') {
      try {
        const { recipient, callerId, callerName } = await request.json();
        if (!recipient || !callerId) {
          return new Response('Missing fields', { status: 400, headers: corsHeaders });
        }
        await env.DB.prepare(
          'INSERT INTO missed_calls (recipient, caller_id, caller_name) VALUES (?, ?, ?)'
        ).bind(recipient, callerId, callerName).run();
        return new Response(JSON.stringify({ success: true }), {
          status: 201,
          headers: { ...corsHeaders, 'Content-Type': 'application/json' }
        });
      } catch (e) {
        return new Response(e.message, { status: 500, headers: corsHeaders });
      }
    }

    // Verpasste Anrufe abrufen
    if (url.pathname === '/missed-calls' && request.method === 'GET') {
      const recipient = url.searchParams.get('recipient');
      if (!recipient) {
        return new Response('Missing recipient', { status: 400, headers: corsHeaders });
      }
      try {
        const { results } = await env.DB.prepare(
          'SELECT caller_id, caller_name, timestamp FROM missed_calls WHERE recipient = ? ORDER BY timestamp DESC LIMIT 50'
        ).bind(recipient).all();
        return new Response(JSON.stringify(results), {
          status: 200,
          headers: { ...corsHeaders, 'Content-Type': 'application/json' }
        });
      } catch (e) {
        return new Response(e.message, { status: 500, headers: corsHeaders });
      }
    }

    return new Response('Not found', { status: 404, headers: corsHeaders });
  }
};`;

        document.getElementById('deployBtn').addEventListener('click', async () => {
            const accountId = document.getElementById('accountId').value.trim();
            const apiToken = document.getElementById('apiToken').value.trim();
            const workerName = document.getElementById('workerName').value.trim() || 'spotme-mailbox';
            const statusDiv = document.getElementById('status');
            const btn = document.getElementById('deployBtn');
            
            if (!accountId || !apiToken) {
                statusDiv.innerHTML = '<div class="error">❌ Account‑ID und API‑Token sind erforderlich.</div>';
                return;
            }
            
            btn.disabled = true;
            btn.textContent = '⏳ Deploye...';
            statusDiv.innerHTML = '<div class="info">⏳ Verbinde mit Cloudflare API...</div>';
            
            try {
                // Worker-Script hochladen
                const putUrl = `https://api.cloudflare.com/client/v4/accounts/${accountId}/workers/scripts/${workerName}`;
                
                const response = await fetch(putUrl, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${apiToken}`,
                        'Content-Type': 'application/javascript',
                    },
                    body: WORKER_CODE
                });
                
                const result = await response.json();
                
                if (!response.ok) {
                    throw new Error(result.errors?.[0]?.message || 'Unbekannter Fehler');
                }
                
                statusDiv.innerHTML = `
                    <div class="success">
                        ✅ Worker <strong>${workerName}</strong> erfolgreich deployed!<br>
                        URL: <a href="https://${workerName}.${result.result.subdomain || 'your-subdomain'}.workers.dev" target="_blank">
                            https://${workerName}.${result.result.subdomain || 'your-subdomain'}.workers.dev
                        </a><br>
                        <small>Die genaue URL findest du im Cloudflare Dashboard.</small>
                    </div>
                `;
                
                // Zusätzlich: Subdomain anzeigen, falls vorhanden
                if (result.result.subdomain) {
                    const domain = `https://${workerName}.${result.result.subdomain}.workers.dev`;
                    statusDiv.innerHTML += `<div class="info">📡 Worker ist erreichbar unter: <strong>${domain}</strong></div>`;
                }
                
            } catch (error) {
                statusDiv.innerHTML = `<div class="error">❌ Fehler: ${error.message}</div>`;
            } finally {
                btn.disabled = false;
                btn.textContent = '🚀 Worker deployen';
            }
        });
    </script>
    
    <hr style="margin: 2rem 0;">
    <h3>📋 Worker‑Code (zur Kontrolle)</h3>
    <pre style="max-height: 300px; overflow-y: auto;">// Worker-Code wird automatisch verwendet.
// Hier nur zur Ansicht.</pre>
</body>
</html>
